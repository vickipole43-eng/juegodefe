    <script>
        function drawRoundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.arcTo(x + width, y, x + width, y + radius, radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.arcTo(x + width, y + height, x + width - radius, y + height, radius);
            ctx.lineTo(x + radius, y + height);
            ctx.arcTo(x, y + height, x, y + height - radius, radius);
            ctx.lineTo(x, y + radius);
            ctx.arcTo(x, y, x + radius, y, radius);
            ctx.closePath();
        }

                {q:"¿Qué regalos trajeron los sabios de Oriente al niño Jesús?",options:["Oro, incienso y mirra","Ropa, trigo y uvas","Plata, perlas y aceite","Monedas y un cordero"],correct:0,explanation:"Le ofreciaron presentes con significado profético y de gran valor real: oro, incienso y mirra."},
                {q:"¿Cuántos discípulos formaron el círculo íntimo y directo de Jesús?",options:["7","10","12","24"],correct:2,explanation:"Jesús elegió a 12 apóstoles para instruirlos de cerca y enviarlos a predicar el Evangelio."},
                {q:"¿A qué se dedicaban Pedro y su hermano Andrés antes de seguir a Jesús?",options:["Carpinteros","Pescadores","Pastores","Escribas"],correct:1,explanation:"Jesús los llamó mientras echaban las redes y les dijo: 'Os haré pescadores de hombres'."},
                {q:"¿Dónde fue tentado Jesús por el enemigo durante 40 días?",options:["En el templo","En el desierto","En un barco","En una montaña alta"],correct:1,explanation:"Jesús permaneció en ayuno y oración en el desierto, superando toda tentación con las Escrituras."},
                {q:"¿Cómo llamó Jesús al grupo de enseñanzas que comienza con 'Bienaventurados'?",options:["Las parábolas","El Sermón del Monte","La gran ley","Los proverbios"],correct:1,explanation:"El Sermón del Monte contiene las bienaventuranzas que describen el carácter del reino de Dios."},
                {q:"En la parábola, ¿sobre qué material debe construir el hombre sabio su casa?",options:["Sobre la arena blanda","Sobre la roca firme","Sobre ramas secas","Sobre nubes"],correct:1,explanation:"Construir sobre la roca representa escuchar y obedecer las enseñanzas de Cristo."},
                {q:"¿Con qué pequeña semilla comparó Jesús el crecimiento del Reino de los Cielos?",options:["Semilla de manzana","Semilla de mostaza","Semilla de sandía","Trigo"],correct:1,explanation:"La semilla de mostaza es muy pequeña, pero crece hasta convertirse en un gran arbusto."},
                {q:"¿Qué hizo el hijo pródigo tras gastar toda su herencia y tener hambre?",options:["Se volvió rey","Regresó arrepentido a su padre","Compró tierras","Se hizo soldado"],correct:1,explanation:"Volvió pidiendo perdón y su padre lo recibió con los brazos abiertos y una gran fiesta."},
                {q:"¿Quién ayudó al hombre herido en el camino tras ser ignorado por otros?",options:["Un sacerdote","Un samaritano","Un soldado romano","Un fariseo"],correct:1,explanation:"El buen samaritano mostró compasión curando las heridas del necesitado sin importar las diferencias."},
                {q:"¿Qué milagro hizo Jesús cuando se desató una tormenta en el mar?",options:["Hizo aparecer un puente","Mandó al viento y al mar calmarse","Voló sobre las nubes","Creó una balsa gigante"],correct:1,explanation:"Jesús increpó al viento y dijo a las aguas: '¡Calla, enmudece!', y se hizo grande bonanza."},
                {q:"¿Qué exclamó la multitud que recibía a Jesús en Jerusalén con palmas?",options:["¡Fuerza rey!","¡Hosanna!","¡Gloria al emperador!","¡Viva Moisés!"],correct:1,explanation:"Recibieron a Jesús con ramos de palmas reconociéndolo como el Mesías prometido."},
                {q:"¿Qué cena especial instituyó Jesús con pan y vino antes de la cruz?",options:["La fiesta de bodas","La Santa Cena","La Pascua del desierto","El banquete de reyes"],correct:1,explanation:"La Última Cena fue el momento donde enseñó sobre el nuevo pacto en su cuerpo y sangre."},
                {q:"¿En qué huerto oró Jesús con gran agonía antes de ser arrestado?",options:["Gethsemané","Edén","Sinaí","Jericó"],correct:0,explanation:"En Gethsemané oró intensamente pidiendo hacer la perfecta voluntad del Padre."},
                {q:"¿Cuántas veces negó Pedro conocer a Jesús antes de que cantara el gallo?",options:["1 vez","3 veces","5 veces","7 veces"],correct:1,explanation:"Pedro negó a Jesús tres veces, cumpliéndose exactamente la advertencia del maestro."},
                {q:"¿Qué le colocaron a Jesús en la cabeza para burlarse de Él como rey?",options:["Una corona de oro","Una corona de espinas","Un turbante romano","Un casco de bronce"],correct:1,explanation:"Los soldados romanos trenzaron una corona de espinas y se la impusieron con burlas."},
                {q:"¿Qué ocurrió milagrosamente al tercer día de que Jesús fuera crucificado?",options:["Un gran eclipse duradero","Resucitó de entre los muertos","El templo voló al cielo","Cayó lluvia de fuego"],correct:1,explanation:"Jesús venció a la muerte y resucitó victorioso, con fe de vida eterna."},
                {q:"¿Qué misión les dejó Jesús a sus discípulos antes de subir al cielo?",options:["Hacerse ricos","Predicar el Evangelio","Construir un gran templo","Estudiar ciencias"],correct:1,explanation:"La Gran Comisión nos envía a predicar el Evangelio y hacer discípulos en todas las naciones."},
                {q:"¿De qué forma descendió el Espíritu Santo sobre los discípulos en Pentecostés?",options:["Como gotas de lluvia dorada","Como lenguas de fuego","En un soplo de viento frío","Como rayos de sol"],correct:1,explanation:"Se les aparecieron lenguas repartidas, como de fuego, asentándose sobre cada uno de ellos."},
                {q:"¿Qué le pasó a Saulo en el camino a Damasco para cambiar su vida?",options:["Vio un gran barco de nubes","Una luz brillante lo cegó y oyó a Jesús","Se perdió en el desierto","Se durmió tres días"],correct:1,explanation:"Una luz del cielo lo rodeó y la voz de Jesús lo llamó, convirtiéndose luego en el apóstol Pablo."},
                {q:"¿Qué milagro liberó a Pablo y Silas de la cárcel mientras cantaban?",options:["Los guardias se durmieron","Un gran terremoto abrió las puertas","Se convirtieron en pájaros","Un ángel los invisibilizó"],correct:1,explanation:"A medianoche, orando y cantando himnos, sobrevino un gran terremoto que soltó las cadenas."},
                {q:"¿Qué elemento de la armadura espiritual protege nuestra mente de dudas?",options:["El escudo de la fe","El yelmo de la salvación","La espada de la palabra","El calzado de paz"],correct:1,explanation:"El yelmo (casco) protege nuestra mente para guardar los pensamientos en la salvación de Cristo."},
                {q:"¿Cómo resume el apóstol Juan la esencia de Dios en su carta?",options:["Dios es fuerza","Dios es Amor","Dios es ciencia","Dios es nubes"],correct:1,explanation:"La Escritura dice categóricamente en 1 Juan 4:8 que 'Dios es amor'."},
                {q:"¿Cuál es la regla de oro que Jesús nos dio sobre tratar a los demás?",options:["Trátalos como te traten","Trata a los demás como quieres ser tratado","No hables con nadie","Solo ayuda a tus amigos"],correct:1,explanation:"La enseñanza de oro es hacer con los demás tal como desearíamos que hicieran con nosotros."},
                {q:"¿Qué significa que Jesús sea el 'Alfa y la Omega' en Apocalipsis?",options:["El sabio y el fuerte","El primero y el último","El sol y la luna","El rey y el pastor"],correct:1,explanation:"Representa que Dios es eterno, controla el inicio y el desenlace de toda la historia."},
                {q:"¿Cómo se llama la hermosa ciudad celestial que describe Juan al final?",options:["Nueva Jerusalén","Roma de oro","Babilonia de nubes","Edén del norte"],correct:0,explanation:"La Nueva Jerusalén, decorada como una novia ataviada para su esposo, sin llanto ni dolor."},
                {q:"¿Qué árbol especial crece a ambos lados del río de la vida celestial?",options:["El olivo de paz","El árbol de la vida","La higuera sagrada","El roble de fuerza"],correct:1,explanation:"El árbol de la vida, que da doce frutos al año y sus hojas son para sanidad de las naciones."},
                {q:"¿Qué pacto simbolizó Dios en el cielo con Noé tras el diluvio?",options:["Una estrella fugaz","Un arcoíris","Una gran nube blanca","Una lluvia dorada"],correct:1,explanation:"El arcoíris en las nubes es la señal de la promesa de que Dios no volverá a destruir la tierra con agua."},
                {q:"¿Qué líder detuvo el sol en el cielo para ganar una batalla?",options:["Moisés","Josué","David","Gedeón"],correct:1,explanation:"Josué clamó al Señor, y el sol se detuvo en medio del cielo casi un día entero."},
                {q:"¿Quién fue la primera mujer jueza de Israel que lideró batallas?",options:["Rut","Débora","Esther","Dalila"],correct:1,explanation:"Débora gobernaba a Israel como jueza y profetisa, y marchó con el ejército para la victoria."},
                {q:"¿Qué traicionera mujer descubrió el secreto de la fuerza de Sansón?",options:["Rut","Dalila","Sara","Noemí"],correct:1,explanation:"Dalila presionó a Sansón hasta que este le confesó el secreto de su voto nazareo."},
                {q:"¿Cómo se llamaba el esposo de Rut que la rescató de la pobreza?",options:["Booz","David","Salomón","Elimelec"],correct:0,explanation:"Booz redimió las tierras de la familia y se casó con Rut, formando parte del linaje del Mesías."},
                {q:"¿Qué madre oró con lágrimas en el templo pidiendo un hijo y concibió a Samuel?",options:["Sara","Ana","María","Isabel"],correct:1,explanation:"Ana oró fervientemente y Dios le concedió a su hijo Samuel, a quien consagró al servicio del templo."},
                {q:"¿Quién construyó el magnífico Primer Templo de Jerusalén?",options:["David","Salomón","Saúl","Herodes"],correct:1,explanation:"El rey Salomón construyó el templo con los planos y materiales que su padre David reunió."},
                {q:"¿Qué apóstol dudó de la resurrección hasta ver las heridas de Jesús?",options:["Pedro","Tomás","Juan","Mateo"],correct:1,explanation:"Tomás dijo que no creería hasta poner sus dedos en las marcas de los clavos en las manos de Jesús."},
                {q:"¿Qué mar milagroso cruzaron los israelitas a pie seco?",options:["El Mar Muerto","El Mar Rojo","El Mar de Galilea","El Mar de Galilea"],correct:1,explanation:"El Mar Rojo fue dividido abriendo paso seguro y cubriendo luego al ejército egipcio."},
                {q:"¿Quién fue el primer mártir que murió apedreado por predicar de Cristo?",options:["Pedro","Esteban","Santiago","Pablo"],correct:1,explanation:"Esteban, lleno de fe y del Espíritu Santo, vio los cielos abiertos antes de fallecer orando por sus verdugos."},
                {q:"¿Qué pastorcillo cuidaba ovejas y componía salmos para Dios?",options:["Salomón","David","José","Samuel"],correct:1,explanation:"David, el menor de sus hermanos, aprendió a confiar en Dios defendiendo sus ovejas de leones y osos."},
                {q:"¿Cuál es la promesa que Jesús nos dejó sobre su regreso?",options:["Que enviaría nubes","Que volverá otra vez","Que todo acabará en silencio","Que no nos preocupemos"],correct:1,explanation:"Jesús prometió: 'Vendré otra vez, y os tomaré a mí mismo, para que donde yo estoy, vosotros también estéis'."},
                {q:"¿A quién vendieron sus hermanos por envidia?",options:["A José","A Benjamín","A Leví","A Judá"],correct:0,explanation:"Sus hermanos vendieron a José a unos mercaderes que iban a Egipto por celos de sus sueños."},
                {q:"¿Cuál es el primer libro del Nuevo Testamento?",options:["Marcos","Mateo","Lucas","Juan"],correct:1,explanation:"El Evangelio según San Mateo inicia la sección del Nuevo Testamento en la Biblia."},
                {q:"¿De qué rey de Israel era hijo el sabio Salomón?",options:["David","Saúl","Roboam","Jeroboam"],correct:0,explanation:"El sabio rey Salomón fue el hijo de David y Betsabé."},
                {q:"¿Quién fue la primera mujer en el mundo según la Biblia?",options:["Sara","María","Eva","Esther"],correct:2,explanation:"Eva fue la primera mujer, creada por Dios para ser compañera de Adán."},
                {q:"¿Quién guió al pueblo hebreo a través del desierto por 40 años?",options:["Abraham","Josué","Moisés","David"],correct:2,explanation:"Moisés lideró al pueblo desde la salida de Egipto hasta las fronteras de la Tierra Prometida."},
                {q:"¿Qué pequeña ave trajo una ramita a Noé para avisar que bajaba el agua?",options:["Un águila","Una paloma","Un halcón","Un cuervo"],correct:1,explanation:"La paloma regresó al Arca con una hoja de olivo, mostrando que la tierra ya se estaba secando."},
                {q:"¿A qué joven arrojó Dios al foso con leones hambrientos y nada le pasó?",options:["A Daniel","A Danielito","A Daniel el profeta","A Daniel el justo"],correct:0,explanation:"Daniel fue librado de los leones porque confió plenamente en la protección de su Dios."},
                {q:"¿Cuántos discípulos directos eligió Jesús para enseñarle su camino?",options:["12 discípulos","7 discípulos","10 discípulos","100 discípulos"],correct:0,explanation:"Jesús llamó a doce hombres sencillos para ser sus discípulos y apóstoles principales."},
                {q:"¿De qué material era la honda que David usó contra Goliat?",options:["De cuero","De hierro","De bronce","De cuerda de oro"],correct:0,explanation:"La honda de los pastores solía estar hecha de cuero o lana trenzada para lanzar piedras."},
                {q:"¿Qué ciudad derribó sus murallas cuando el pueblo cantó y tocó trompetas?",options:["Jericó","Nínive","Babilonia","Roma"],correct:0,explanation:"Al dar la séptima vuelta en el séptimo día, el pueblo gritó y los muros de Jericó se derrumbaron."}

                {q:"¿Cuántos libros conforman la estructura canónica del Nuevo Testamento?",options:["39 libros","27 libros","46 libros","12 libros"],correct:1,explanation:"El Nuevo Testamento consta de 27 libros inspirados aceptados por la iglesia."},
                {q:"¿Cuáles son los primeros cinco libros de la Biblia conocidos como el Pentateuco?",options:["Génesis, Éxodo, Levítico, Números, Deuteronomio","Josué, Jueces, Rut, Samuel, Reyes","Isaías, Jeremías, Lamentaciones, Ezequiel, Daniel","Mateo, Marcos, Lucas, Juan, Hechos"],correct:0,explanation:"El Pentateuco o la Torá hebrea comprende los cinco libros fundamentales escritos por Moisés."},

                {q:"¿Cómo se llamaba la sierva egipcia de Sara que fue madre de Ismael?",options:["Agar","Cetura","Rebeca","Lea"],correct:0,explanation:"Agar concibió a Ismael con Abraham debido a la impaciencia de Sara por tener un heredero."},
                {q:"¿Qué dos ciudades fueron destruidas por azufre y fuego debido a su gran maldad?",options:["Jerusalén y Samaria","Sodoma y Gomorra","Nínive y Babilonia","Tiro y Sidón"],correct:1,explanation:"Sodoma y Gomorra fueron arrasadas, escapando solo Lot y sus dos hijas por intercesión divina."},
                {q:"¿En qué monte le pidió Dios a Abraham que sacrificara a su único hijo Isaac?",options:["Monte Sinaí","Monte Moriah","Monte Ararat","Monte de los Olivos"],correct:1,explanation:"En el monte Moriah, Abraham demostró fe absoluta, siendo provisto un carnero en lugar de Isaac."},
                {q:"¿Qué nuevo nombre recibió Jacob tras luchar toda una noche con el ángel?",options:["Israel","Edom","Jesurún","Judá"],correct:0,explanation:"Le fue dado el nombre de Israel, que significa 'El que lucha con Dios y prevalece'."},
                {q:"¿Quiénes fueron las dos esposas hermanas de Jacob obtenidas por su trabajo con Labán?",options:["Lea y Raquel","Sara y Agar","Milca y Sarai","Rebeca y Cetura"],correct:0,explanation:"Jacob trabajó 14 años en total para Labán para poder desposar a Lea y a su amada Raquel."},
                {q:"¿Cuál de los hijos de Jacob recibió la promesa de que el cetro real no se apartaría de su línea?",options:["José","Judá","Rubén","Leví"],correct:1,explanation:"La profecía mesiánica de Jacob en Génesis 49 señala que de Judá vendría el Shiloh (el Mesías)."},
                {q:"¿Qué plaga final doblegó al Faraón para permitir la salida de los hebreos?",options:["La muerte de los primogénitos","La plaga de langostas","Las tinieblas densas","La conversión del agua en sangre"],correct:0,explanation:"La plaga de los primogénitos requirió la sangre del cordero pascual en los dinteles de las casas de Israel."},
                {q:"¿Qué elemento sagrado del Tabernáculo contenía las Tablas de la Ley, el maná y la vara de Aarón?",options:["El Altar del Incienso","El Arca de la Alianza","La Mesa de los Panes","El Candelero de Oro"],correct:1,explanation:"El Arca de la Alianza en el Lugar Santísimo resguardaba estos testimonios del pacto divino."},
                {q:"¿En qué gran día de ayuno el Sumo Sacerdote entraba al Lugar Santísimo para expiar los pecados?",options:["Yom Kippur","Pesaj","Shavuot","Sucot"],correct:0,explanation:"Yom Kippur o el Día de la Expiación era el único día del año en que se cruzaba el velo del santuario."},
                {q:"¿Cómo se llamaban las ciudades especiales designadas para proteger a los homicidas involuntarios?",options:["Ciudades de Refugio","Ciudades de Levitas","Ciudades del Pacto","Santuarios Reales"],correct:0,explanation:"Se establecieron 6 ciudades de refugio para evitar venganzas de sangre injustas antes del juicio."},
                {q:"¿Qué profeta pagano fue contratado por Balac para maldecir a Israel pero su asna le habló?",options:["Balaam","Elías","Eliseo","Miqueas"],correct:0,explanation:"Balaam fue reprendido por su propia asna y terminó bendiciendo a Israel por orden del Señor."},
                {q:"¿Qué levita lideró una rebelión contra Moisés y Aarón, siendo tragado por la tierra?",options:["Coré","Datán","Abiram","Mili"],correct:0,explanation:"La rebelión de Coré desafió el liderazgo espiritual divinamente ordenado de Aarón."},
                {q:"¿Qué objeto levantó Moisés en el desierto para sanar a los mordidos por serpientes?",options:["Una cruz de madera","La serpiente de bronce","Una tabla de piedra","Un estandarte blanco"],correct:1,explanation:"La serpiente de bronce prefiguraba a Jesús levantado en la cruz para salvar a la humanidad."},
                {q:"¿Cómo se conoce al pasaje de Deuteronomio 6:4 que dice: 'Oye, Israel: El Señor nuestro Dios, el Señor uno es'?",options:["El Shemá","La Torá","El Decálogo","La Haftará"],correct:0,explanation:"El Shemá Israel es la declaración fundamental del monoteísmo de la fe judía."},
                {q:"¿Dónde renovó Josué el pacto con el pueblo diciendo: 'Yo y mi casa serviremos al Señor'?",options:["Siquem","Jericó","Sinaí","Gilgal"],correct:0,explanation:"El solemne pacto y despedida de Josué tuvo lugar ante los ancianos reunidos en Siquem."},
                {q:"¿Qué juez de Israel hizo un voto precipitado que resultó en el sacrificio de su única hija?",options:["Jefté","Gedeón","Sansón","Barac"],correct:0,explanation:"Jefté prometió sacrificar lo primero que saliera de su casa tras la victoria militar, resultando ser su hija."},
                {q:"¿Cuál era la respuesta correcta al acertijo que Sansón propuso en su boda?",options:["Del devorador salió comida, y del fuerte salió dulzura","¿Qué cosa hay más dulce que la miel?","El fuego consume la paja y el agua apaga la sed","El sol calienta la roca y la lluvia ablanda el campo"],correct:1,explanation:"Los filisteos descifraron el acertijo de Sansón amenazando a su esposa para obtener la respuesta."},
                {q:"¿Qué trágica frase exclamó la nuera de Elí al nacer su hijo tras ser capturada el Arca?",options:["Icabod","Ebenezer","Maranata","Anatema"],correct:0,explanation:"Icabod expresa el dolor teológico de la pérdida de la presencia manifiesta de Dios entre su pueblo."},
                {q:"¿A qué ídolo filisteo derribó el poder de Dios en su propio templo al capturar el Arca?",options:["Dagón","Baal","Astarot","Moloc"],correct:0,explanation:"La estatua de Dagón cayó postrada ante el Arca y sus manos y cabeza se rompieron."},
                {q:"¿Qué grave pecado de orgullo cometió David al final de su reinado provocando una peste?",options:["Construir un palacio de oro","Hacer un censo militar del pueblo","Desposar reinas extranjeras","Sacrificar en lugar de los sacerdotes"],correct:1,explanation:"El censo mostró que David confió más en la fuerza de su ejército que en la protección de Yahveh."},
                {q:"¿Quién era el esposo oficial de Betsabé al cual David ordenó enviar al frente de batalla?",options:["Urías el heteo","Joab el general","Abisai","Benaía"],correct:0,explanation:"David ordenó exponer a Urías a la muerte en batalla para encubrir su pecado de adulterio."},
                {q:"¿Qué hijo rebelde de David murió trágicamente al quedar colgado de su cabello en una encina?",options:["Absalón","Adonías","Amnón","Salomón"],correct:0,explanation:"Absalón lideró una revuelta contra su padre y murió atrapado en el bosque por el ejército de David."},

                {q:"¿Qué sacerdote y escriba lideró la restauración de la enseñanza de la Torá tras el exilio?",options:["Esdras","Nehemías","Zorobabel","Malaquías"],correct:0,explanation:"Esdras se dedicó a estudiar, cumplir y enseñar la Ley de Dios al remanente repatriado."},
                {q:"¿Quiénes fueron los dos principales opositores que intentaron frenar la reconstrucción de las murallas?",options:["Sanbalat y Tobías","Hageo y Zacarías","Esdras y Zorobabel","Amán y Mardoqueo"],correct:0,explanation:"Sanbalat y Tobías usaron burlas, amenazas y conspiraciones contra Nehemías, pero fracasaron."},
                {q:"¿Cómo se llamaba el primo y tutor de la reina Esther que rehusó arrodillarse ante Amán?",options:["Mardoqueo","Asuero","Haras","Hatac"],correct:0,explanation:"La fidelidad y resistencia de Mardoqueo desató la trama de salvación descrita en el libro de Esther."},

                {q:"Además de David, ¿qué otro levita y músico es autor de numerosos Salmos?",options:["Asaf","Salomón","Moisés","Esdras"],correct:0,explanation:"Asaf es acreditado como autor de doce Salmos enfocados en la soberanía de Dios y las dudas de la fe."},

                {q:"¿Qué tipo de literatura representa el Cantar de los Cantares?",options:["Poesía de amor y alegoría matrimonial","Profecía de juicio contra Asiria","Crónica histórica de reyes","Leyes de purificación ritual"],correct:0,explanation:"Cantar de los Cantares exalta el amor matrimonial y es visto como alegoría del amor de Dios por su pueblo."},

                {q:"¿Qué profeta anunció un 'Nuevo Pacto' donde Dios escribiría la ley en los corazones?",options:["Jeremías","Isaías","Ezequiel","Miqueas"],correct:0,explanation:"Jeremías 31 profetiza la transición de las tablas de piedra a las tablas de carne del corazón."},
                {q:"¿Qué visión profética de Ezequiel ilustra la resurrección nacional y espiritual de Israel?",options:["El valle de los huesos secos","La estatua de oro gigante","Los cuatro jinetes","El templo celestial sin puertas"],correct:0,explanation:"Ezequiel 37 relata cómo el soplo de Dios dio vida y orden a un gran ejército de huesos secos."},
                {q:"En la visión de Daniel, ¿qué representan los materiales de la gran estatua de Nabucodonosor?",options:["Imperios mundiales sucesivos","Los doce apóstoles","Los días de la creación","Las plagas de Egipto"],correct:0,explanation:"La cabeza de oro (Babilonia), pecho de plata (Medopersia), etc., prefiguraron la historia geopolítica."},

                {q:"¿A qué profeta ordenó Dios casarse con una mujer infiel llamada Gomer para ilustrar el amor fiel de Yahveh?",options:["Oseas","Amós","Miqueas","Sofonías"],correct:0,explanation:"Oseas vivió en carne propio el dolor de la traición para predicar sobre la redención divina de Israel."},

            {r:"1 Timoteo 6:12", t:"Pelea la buena batalla de la fe, echa mano de la vida eterna.", c:"Fe"},
            {r:"2 Timoteo 4:7", t:"He peleado la buena batalla, he acabado la carrera, he guardado la fe.", c:"Fe"},
            {r:"Apocalipsis 14:12", t:"Aquí está la paciencia de los santos, los que guardan los mandamientos de Dios y la fe de Jesús.", c:"Fe"},
            {r:"Mateo 9:22", t:"Jesús, volviéndose y mirándola, dijo: Ten ánimo, hija; tu fe te ha salvado.", c:"Fe"},
            {r:"Lucas 7:50", t:"Pero él dijo a la mujer: Tu fe te ha salvado, ve en paz.", c:"Fe"},
            {r:"Romanos 4:3", t:"Porque ¿qué dice la Escritura? Creyó Abraham a Dios, y le fue contado por justicia.", c:"Fe"},
            {r:"Romanos 4:20", t:"Tampoco dudó, por incredulidad, de la promesa de Dios, sino que se fortaleció en fe, dando gloria a Dios.", c:"Fe"},
            {r:"1 Corintios 2:5", t:"Para que vuestra fe no esté fundada en la sabiduría de los hombres, sino en el poder de Dios.", c:"Fe"},
            {r:"1 Corintios 16:13", t:"Velad, estad firmes en la fe; portaos varonilmente, y esforzaos.", c:"Fe"},
            {r:"2 Corintios 13:5", t:"Examinaos a vosotros mismos si estáis en la fe; probaos a vosotros mismos.", c:"Fe"},
            {r:"Efesios 3:17", t:"Para que habite Cristo por la fe en vuestros corazones, a fin de que, arraigados y cimentados en amor.", c:"Fe"},
            {r:"Colosenses 1:23", t:"Si en verdad permanecéis fundados y firmes en la fe, y sin moveros de la esperanza del evangelio.", c:"Fe"},
            {r:"1 Tesalonicenses 5:8", t:"Pero nosotros, que somos del día, seamos sobrios, habiéndonos vestido con la coraza de fe y de amor.", c:"Fe"},
            {r:"2 Tesalonicenses 1:3", t:"Debemos siempre dar gracias a Dios por vosotros... por cuanto vuestra fe va creciendo.", c:"Fe"},
            {r:"Filemón 1:6", t:"Para que la participación de tu fe sea eficaz en el conocimiento de todo el bien que está en vosotros por Cristo Jesús.", c:"Fe"},

            // Categoria: Amor (40)
            {r:"Juan 3:16", t:"Porque de tal manera amó Dios al mundo, que ha dado a su Hijo unigénito, para que todo aquel que en él cree, no se pierda, mas tenga vida eterna.", c:"Amor"},
            {r:"1 Corintios 13:4", t:"El amor es sufrido, es benigno; el amor no tiene envidia, el amor no es jactancioso, no se envanece.", c:"Amor"},
            {r:"1 Corintios 13:13", t:"Y ahora permanecen la fe, la esperanza y el amor, estos tres; pero el mayor de ellos es el amor.", c:"Amor"},
            {r:"1 Juan 4:8", t:"El que no ama, no ha conocido a Dios; porque Dios es amor.", c:"Amor"},
            {r:"1 Juan 4:19", t:"Nosotros le amamos a él, porque él nos amó primero.", c:"Amor"},
            {r:"Juan 13:34", t:"Un mandamiento nuevo os doy: Que os améis unos a otros; como yo os he amado, que también os améis unos a otros.", c:"Amor"},
            {r:"Juan 15:13", t:"Nadie tiene mayor amor que este, que uno ponga su vida por sus amigos.", c:"Amor"},
            {r:"Romanos 5:8", t:"Mas Dios muestra su amor para con nosotros, en que siendo aún pecadores, Cristo murió por nosotros.", c:"Amor"},
            {r:"Romanos 8:39", t:"Ni lo alto, ni lo profundo, ni ninguna otra cosa creada nos podrá separar del amor de Dios, que es en Cristo Jesús Señor nuestro.", c:"Amor"},
            {r:"Gálatas 5:22", t:"Mas el fruto del Espíritu es amor, gozo, paz, paciencia, benignidad, bondad, fe.", c:"Amor"},
            {r:"1 Juan 4:18", t:"En el amor no hay temor, sino que el perfecto amor echa fuera el temor.", c:"Amor"},
            {r:"Colosenses 3:14", t:"Y sobre todas estas cosas vestíos de amor, que es el vínculo perfecto.", c:"Amor"},
            {r:"1 Pedro 4:8", t:"Y ante todo, tened entre vosotros ferviente amor; porque el amor cubrirá multitud de pecados.", c:"Amor"},
            {r:"1 Juan 3:18", t:"Hijos míos, no amemos de palabra ni de lengua, sino de hecho y en verdad.", c:"Amor"},
            {r:"Romanos 12:9", t:"El amor sea sin fingimiento. Aborreced lo malo, seguid lo bueno.", c:"Amor"},
            {r:"Deuteronomio 6:5", t:"Y amarás a Jehová tu Dios de todo tu corazón, y de toda tu alma, y con todas tus fuerzas.", c:"Amor"},
            {r:"Mateo 22:37", t:"Jesús le dijo: Amarás al Señor tu Dios con todo tu corazón, y con toda tu alma, y con toda tu mente.", c:"Amor"},
            {r:"Mateo 22:39", t:"Y el segundo es semejante: Amarás a tu prójimo como a ti mismo.", c:"Amor"},
            {r:"Proverbios 10:12", t:"El odio despierta rencillas; pero el amor cubrirá todas las faltas.", c:"Amor"},
            {r:"1 Juan 4:7", t:"Amados, amémonos unos a otros; porque el amor es de Dios. Todo aquel que ama, es nacido de Dios, y conoce a Dios.", c:"Amor"},
            {r:"1 Juan 4:10", t:"En esto consiste el amor: no en que nosotros hayamos amado a Dios, sino en que él nos amó a nosotros.", c:"Amor"},
            {r:"Lucas 6:27", t:"Pero a vosotros los que oís, os digo: Amad a vuestros enemigos, haced bien a los que os aborrecen.", c:"Amor"},
            {r:"Romanos 13:10", t:"El amor no hace mal al prójimo; así que el cumplimiento de la ley es el amor.", c:"Amor"},
            {r:"1 Corintios 16:14", t:"Todas vuestras cosas sean hechas con amor.", c:"Amor"},
            {r:"Efesios 4:2", t:"Con toda humildad y mansedumbre, soportándoos con paciencia los unos a los otros en amor.", c:"Amor"},
            {r:"Filipenses 1:9", t:"Y esto pido en oración, que vuestro amor abunde aun más y más en ciencia y en todo conocimiento.", c:"Amor"},
            {r:"1 Tesalonicenses 3:12", t:"Y el Señor os haga crecer y abundar en amor unos para con otros y para con todos.", c:"Amor"},
            {r:"2 Tesalonicenses 3:5", t:"Y el Señor encamine vuestros corazones al amor de Dios, y a la paciencia de Cristo.", c:"Amor"},
            {r:"1 Timoteo 1:5", t:"Pues el propósito de este mandamiento es el amor nacido de corazón limpio.", c:"Amor"},
            {r:"2 Timoteo 1:7", t:"Porque no nos ha dado Dios espíritu de cobardía, sino de poder, de amor y de dominio propio.", c:"Amor"},
            {r:"Hebreos 10:24", t:"Y considerémonos unos a otros para estimularnos al amor y a las buenas obras.", c:"Amor"},
            {r:"1 Pedro 1:22", t:"Habiendo purificado vuestras almas por la obediencia a la verdad... amaos unos a otros entrañablemente, de corazón puro.", c:"Amor"},
            {r:"1 Juan 3:1", t:"Mirad cuál amor nos ha dado el Padre, para que seamos llamados hijos de Dios.", c:"Amor"},
            {r:"1 Juan 3:16", t:"En esto hemos conocido el amor, en que él puso su vida por nosotros; también nosotros debemos poner nuestras vidas por los hermanos.", c:"Amor"},
            {r:"1 Juan 4:11", t:"Amados, si Dios nos ha amado así, debemos también nosotros amarnos unos a otros.", c:"Amor"},
            {r:"1 Juan 4:12", t:"Nadie ha visto jamás a Dios. Si nos amamos unos a otros, Dios permanece en nosotros, y su amor se ha perfeccionado en nosotros.", c:"Amor"},
            {r:"1 Juan 4:16", t:"Y nosotros hemos conocido y creído el amor que Dios tiene para con nosotros... el que permanece en amor, permanece en Dios, y Dios en él.", c:"Amor"},
            {r:"2 Juan 1:6", t:"Y este es el amor, que andemos según sus mandamientos.", c:"Amor"},
            {r:"Apocalipsis 3:19", t:"Yo reprendo y castigo a todos los que amo; sé, pues, celoso, y arrepiéntete.", c:"Amor"},
            {r:"Sofonías 3:17", t:"Jehová está en medio de ti, poderoso, él salvará; se gozará sobre ti con alegría, callará de amor.", c:"Amor"},

            // Categoria: Esperanza (40)
            {r:"Jeremías 29:11", t:"Porque yo sé los pensamientos que tengo acerca de vosotros, dice Jehová, pensamientos de paz, y no de mal, para daros el fin que esperáis.", c:"Esperanza"},
            {r:"Romanos 15:13", t:"Y el Dios de esperanza os llene de todo gozo y paz en el creer, para que abundéis en esperanza por el poder del Espíritu Santo.", c:"Esperanza"},
            {r:"Salmo 39:7", t:"Y ahora, Señor, ¿qué esperaré? Mi esperanza está en ti.", c:"Esperanza"},
            {r:"Isaías 40:31", t:"Pero los que esperan a Jehová tendrán nuevas fuerzas; levantarán alas como las águilas.", c:"Esperanza"},
            {r:"Lamentaciones 3:24", t:"Mi porción es Jehová, dijo mi alma; por tanto, en él esperaré.", c:"Esperanza"},
            {r:"Romanos 5:5", t:"Y la esperanza no avergüenza; porque el amor de Dios ha sido derramado en nuestros corazones por el Espíritu Santo que nos fue dado.", c:"Esperanza"},
            {r:"Salmo 62:5", t:"Alma mía, en Dios solamente reposa, porque de él es mi esperanza.", c:"Esperanza"},
            {r:"Salmo 119:114", t:"Mi escondedero y mi escudo eres tú; en tu palabra he esperado.", c:"Esperanza"},
            {r:"Hebreos 6:19", t:"La cual tenemos como segura y firme ancla del alma, y que penetra hasta dentro del velo.", c:"Esperanza"},
            {r:"Romanos 8:24", t:"Porque en esperanza fuimos salvos; pero la esperanza que se ve, no es esperanza; porque lo que alguno ve, ¿a qué esperarlo?", c:"Esperanza"},
            {r:"1 Pedro 1:3", t:"Bendito el Dios y Padre de nuestro Señor Jesucristo, que según su grande misericordia nos hizo renacer para una esperanza viva.", c:"Esperanza"},
            {r:"Tito 2:13", t:"Aguardando la esperanza bienaventurada y la manifestación gloriosa de nuestro gran Dios y Salvador Jesucristo.", c:"Esperanza"},
            {r:"Colosenses 1:27", t:"A quienes Dios quiso dar a conocer las riquezas de la gloria de este misterio... que es Cristo en vosotros, la esperanza de gloria.", c:"Esperanza"},
            {r:"Salmo 71:5", t:"Porque tú, oh Señor Jehová, eres mi esperanza, seguridad mía desde mi juventud.", c:"Esperanza"},
            {r:"Proverbios 23:18", t:"Porque ciertamente hay fin, y tu esperanza no será cortada.", c:"Esperanza"},
            {r:"Efesios 4:4", t:"Un solo cuerpo, y un solo Espíritu, como fuisteis también llamados en una misma esperanza de vuestra vocación.", c:"Esperanza"},
            {r:"1 Pedro 3:15", t:"Y estad siempre preparados para presentar defensa con mansedumbre y reverencia ante todo el que os demande razón de la esperanza que hay en vosotros.", c:"Esperanza"},
            {r:"Proverbios 13:12", t:"La esperanza que se demora es tormento del corazón; pero árbol de vida es el deseo cumplido.", c:"Esperanza"},
            {r:"Salmo 31:24", t:"Esforzaos todos vosotros los que esperáis en Jehová, y tome aliento vuestro corazón.", c:"Esperanza"},
            {r:"Salmo 33:18", t:"He aquí el ojo de Jehová sobre los que le temen, sobre los que esperan en su misericordia.", c:"Esperanza"},
            {r:"Salmo 33:22", t:"Sea tu misericordia, oh Jehová, sobre nosotros, según esperamos en ti.", c:"Esperanza"},
            {r:"Salmo 42:11", t:"¿Por qué te abates, oh alma mía, y por qué te turbas dentro de mí? Espera en Dios; porque aún he de alabarle.", c:"Esperanza"},
            {r:"Salmo 130:5", t:"Esperé yo a Jehová, esperó mi alma; en su palabra he esperado.", c:"Esperanza"},
            {r:"Salmo 146:5", t:"Bienaventurado aquel cuyo ayudador es el Dios de Jacob, cuya esperanza está en Jehová su Dios.", c:"Esperanza"},
            {r:"Proverbios 10:28", t:"La esperanza de los justos es alegría; mas la esperanza de los impíos perecerá.", c:"Esperanza"},
            {r:"Proverbios 24:14", t:"Así será a tu alma el conocimiento de la sabiduría; si la hallares tendrás recompensa, y tu esperanza no será cortada.", c:"Esperanza"},
            {r:"Lamentaciones 3:25", t:"Bueno es Jehová a los que en él esperan, al alma que le busca.", c:"Esperanza"},
            {r:"Lamentaciones 3:26", t:"Bueno es esperar en silencio la salvación de Jehová.", c:"Esperanza"},
            {r:"Hechos 24:15", t:"Teniendo esperanza en Dios... de que ha de haber resurrección de los muertos, así de justos como de injustos.", c:"Esperanza"},
            {r:"Romanos 4:18", t:"Él creyó en esperanza contra esperanza, para llegar a ser padre de muchas gentes, conforme a lo que se le había dicho.", c:"Esperanza"},
            {r:"Romanos 5:2", t:"Por quien también tenemos entrada por la fe a esta gracia en la cual estamos firmes, y nos gloriamos en la esperanza de la gloria de Dios.", c:"Esperanza"},
            {r:"Romanos 12:12", t:"Gozosos en la esperanza; sufridos en la tribulación; constantes en la oración.", c:"Esperanza"},
            {r:"Romanos 15:4", t:"Porque las cosas que se escribieron antes, para nuestra enseñanza se escribieron, a fin de que por la paciencia y la consolación de las Escrituras, tengamos esperanza.", c:"Esperanza"},
            {r:"1 Corintios 15:19", t:"Si en esta vida solamente esperamos en Cristo, somos los más dignos de conmiseración de todos los hombres.", c:"Esperanza"},
            {r:"Gálatas 5:5", t:"Pues nosotros por el Espíritu aguardamos por fe la esperanza de la justicia.", c:"Esperanza"},
            {r:"Efesios 1:18", t:"Alumbrando los ojos de vuestro entendimiento, para que sepáis cuál es la esperanza a que él os ha llamado.", c:"Esperanza"},
            {r:"Filipenses 1:20", t:"Conforme a mi anhelo ferviente y esperanza de que en nada será avergonzado; antes bien con toda confianza... será magnificado Cristo en mi cuerpo.", c:"Esperanza"},
            {r:"Colosenses 1:5", t:"A causa de la esperanza que os está guardada en los cielos, de la cual ya habéis oído por la palabra verdadera del evangelio.", c:"Esperanza"},
            {r:"1 Tesalonicenses 1:3", t:"Acordándonos sin cesar delante del Dios y Padre nuestro de la obra de vuestra fe... y de vuestra constancia en la esperanza.", c:"Esperanza"},
            {r:"Tito 1:2", t:"En la esperanza de la vida eterna, la cual Dios, que no miente, prometió desde antes del principio de los siglos.", c:"Esperanza"},

            // Categoria: Fortaleza (40)
            {r:"Filipenses 4:13", t:"Todo lo puedo en Cristo que me fortalece.", c:"Fortaleza"},
            {r:"Josué 1:9", t:"Mira que te mando que te esfuerces y seas valiente; no temas ni desmayes, porque Jehová tu Dios estará contigo dondequiera que vayas.", c:"Fortaleza"},
            {r:"Isaías 41:10", t:"No temas, porque yo estoy contigo; no desmayes, porque yo soy tu Dios que te esfuerzo; siempre te ayudaré.", c:"Fortaleza"},
            {r:"Salmo 27:1", t:"Jehová es mi luz y mi salvación; ¿de quién temeré? Jehová es la fortaleza de mi vida; ¿de quién he de atemorizarme?", c:"Fortaleza"},
            {r:"Salmo 46:1", t:"Dios es nuestro amparo y fortaleza, nuestro pronto auxilio en las tribulaciones.", c:"Fortaleza"},
            {r:"Salmo 28:7", t:"Jehová es mi fortaleza y mi escudo; en él confió mi corazón, y fui ayudado.", c:"Fortaleza"},
            {r:"2 Timoteo 1:7", t:"Porque no nos ha dado Dios espíritu de cobardía, sino de poder, de amor y de dominio propio.", c:"Fortaleza"},
            {r:"Salmo 18:2", t:"Jehová, roca mía y castillo mío, y mi libertador; Dios mío, fortaleza mía, en él confiaré.", c:"Fortaleza"},
            {r:"Éxodo 15:2", t:"Jehová es mi fortaleza y mi cántico, y ha sido mi salvación. Este es mi Dios, y lo glorificaré.", c:"Fortaleza"},
            {r:"Salmo 73:26", t:"Mi carne y mi corazón desfallecen; mas la roca de mi corazón y mi porción es Dios para siempre.", c:"Fortaleza"},
            {r:"Isaías 12:2", t:"He aquí Dios es salvación mía; me aseguraré y no temeré; porque mi fortaleza y mi canción es JAH Jehová.", c:"Fortaleza"},
            {r:"Salmo 118:14", t:"Mi fortaleza y mi cántico es JAH, y él ha sido mi salvación.", c:"Fortaleza"},
            {r:"2 Corintios 12:9", t:"Y me ha dicho: Bástate mi gracia; porque mi poder se perfecciona en la debilidad.", c:"Fortaleza"},
            {r:"Deuteronomio 31:6", t:"Esforzaos y cobrad ánimo; no temáis, ni tengáis miedo de ellos, porque Jehová tu Dios es el que va contigo.", c:"Fortaleza"},
            {r:"Isaías 40:29", t:"Él da esfuerzo al cansado, y multiplica las fuerzas al que no tiene ningunas.", c:"Fortaleza"},
            {r:"Nehemías 8:10", t:"No os entristezcáis, porque el gozo de Jehová es vuestra fuerza.", c:"Fortaleza"},
            {r:"Efesios 6:10", t:"Por lo demás, hermanos míos, fortaleceos en el Señor, y en el poder de su fuerza.", c:"Fortaleza"},
            {r:"Salmo 18:32", t:"Dios es el que me ciñe de fuerza, y quien hace perfecto mi camino.", c:"Fortaleza"},
            {r:"Salmo 29:11", t:"Jehová dará poder a su pueblo; Jehová bendecirá a su pueblo con paz.", c:"Fortaleza"},
            {r:"Salmo 31:3", t:"Porque tú eres mi roca y mi castillo; por tu nombre me guiarás y me encaminarás.", c:"Fortaleza"},
            {r:"Salmo 37:39", t:"Pero la salvación de los justos es de Jehová, y él es su fortaleza en el tiempo de la angustia.", c:"Fortaleza"},
            {r:"Salmo 59:17", t:"Fortaleza mía, a ti cantaré; porque eres, Dios, mi amparo, el Dios de mi misericordia.", c:"Fortaleza"},
            {r:"Salmo 84:5", t:"Bienaventurado el hombre que tiene sus fuerzas en ti, en cuyo corazón están tus caminos.", c:"Fortaleza"},
            {r:"Salmo 138:3", t:"El día que clamé, me respondiste; me fortaleciste con vigor en mi alma.", c:"Fortaleza"},
            {r:"Salmo 144:1", t:"Bendito sea Jehová, mi roca, quien adiestra mis manos para la batalla, y mis dedos para la guerra.", c:"Fortaleza"},
            {r:"Proverbios 18:10", t:"Torre fuerte es el nombre de Jehová; a él correrá el justo, y estará levantado.", c:"Fortaleza"},
            {r:"Isaías 25:4", t:"Porque fuiste fortaleza al pobre, fortaleza al menesteroso en su aflicción, refugio contra el turbión.", c:"Fortaleza"},
            {r:"Isaías 26:4", t:"Confiad en Jehová perpetuamente, porque en JAH Jehová está la fortaleza de los siglos.", c:"Fortaleza"},
            {r:"Jeremías 16:19", t:"Oh Jehová, fortaleza mía y fuerza mía, y refugio mío en el tiempo de la aflicción.", c:"Fortaleza"},
            {r:"Habacuc 3:19", t:"Jehová el Señor es mi fortaleza, el cual hará mis pies como de ciervas, y en mis alturas me hará andar.", c:"Fortaleza"},
            {r:"Zacarías 4:6", t:"No con ejército, ni con fuerza, sino con mi Espíritu, ha dicho Jehová de los ejércitos.", c:"Fortaleza"},
            {r:"2 Corintios 4:16", t:"Por tanto, no desmayamos; antes aunque este nuestro hombre exterior se va desgastando, el interior no obstante se renueva de día en día.", c:"Fortaleza"},
            {r:"2 Corintios 12:10", t:"Por lo cual, por amor a Cristo me gozo en las debilidades... porque cuando soy débil, entonces soy fuerte.", c:"Fortaleza"},
            {r:"Filipenses 4:19", t:"Mi Dios, pues, suplirá todo lo que os falte conforme a sus riquezas en gloria en Cristo Jesús.", c:"Fortaleza"},
            {r:"Colosenses 1:11", t:"Fortalecidos con todo poder, conforme a la potencia de su gloria, para toda paciencia y longanimidad.", c:"Fortaleza"},
            {r:"2 Tesalonicenses 3:3", t:"Pero fiel es el Señor, que os afirmará y guardará del mal.", c:"Fortaleza"},
            {r:"2 Timoteo 2:1", t:"Tú, pues, hijo mío, esfuérzate en la gracia que es en Cristo Jesús.", c:"Fortaleza"},
            {r:"2 Timoteo 4:17", t:"Pero el Señor estuvo a mi lado, y me dio fuerzas, para que por mí fuese cumplida la predicación.", c:"Fortaleza"},
            {r:"Hebreos 11:34", t:"Apagaron fuegos impetuosos, evitaron filo de espada, sacaron fuerzas de debilidad, se hicieron fuertes en batallas.", c:"Fortaleza"},
            {r:"1 Pedro 5:10", t:"Mas el Dios de toda gracia... después que hayáis padecido un poco de tiempo, él mismo os perfeccione, afirme, fortalezca y establezca.", c:"Fortaleza"},

            // Categoria: Sabiduría (40)
            {r:"Santiago 1:5", t:"Y si alguno de vosotros tiene falta de sabiduría, pídala a Dios, el cual da a todos abundantemente y sin reproche, y le será dada.", c:"Sabiduría"},
            {r:"Proverbios 1:7", t:"El principio de la sabiduría es el temor de Jehová; los insensatos desprecian la sabiduría y la enseñanza.", c:"Sabiduría"},
            {r:"Proverbios 3:5", t:"Fíate de Jehová de todo tu corazón, y no te apoyes en tu propia prudencia.", c:"Sabiduría"},
            {r:"Proverbios 3:13", t:"Bienaventurado el hombre que halla la sabiduría, y que obtiene la inteligencia.", c:"Sabiduría"},
            {r:"Proverbios 4:7", t:"Sabiduría ante todo; adquiere sabiduría; y sobre todas tus posesiones adquiere inteligencia.", c:"Sabiduría"},
            {r:"Salmo 111:10", t:"El principio de la sabiduría es el temor de Jehová; buen entendimiento tienen todos los que practican sus mandamientos.", c:"Sabiduría"},
            {r:"Proverbios 9:10", t:"El temor de Jehová es el principio de la sabiduría, y el conocimiento del Santísimo es la inteligencia.", c:"Sabiduría"},
            {r:"Colosenses 2:3", t:"En quien están escondidos todos los tesoros de la sabiduría y del conocimiento.", c:"Sabiduría"},
            {r:"Proverbios 2:6", t:"Porque Jehová da la sabiduría, y de su boca viene el conocimiento y la inteligencia.", c:"Sabiduría"},
            {r:"Eclesiastés 7:12", t:"Porque escudo es la ciencia, y escudo es el dinero; pero la sabiduría excede, en que da vida a sus poseedores.", c:"Sabiduría"},
            {r:"Santiago 3:17", t:"Pero la sabiduría que es de lo alto es primeramente pura, después pacífica, amable, benigna, llena de misericordia.", c:"Sabiduría"},
            {r:"Proverbios 16:16", t:"Mejor es adquirir sabiduría que oro preciado; y adquirir inteligencia vale más que la plata.", c:"Sabiduría"},
            {r:"Salmo 90:12", t:"Enséñanos de tal modo a contar nuestros días, que traigamos al corazón sabiduría.", c:"Sabiduría"},
            {r:"Proverbios 13:20", t:"El que anda con sabios, sabio será; mas el que se junta con necios será quebrantado.", c:"Sabiduría"},
            {r:"Proverbios 19:8", t:"El que posee entendimiento ama su alma; el que guarda la prudencia hallará el bien.", c:"Sabiduría"},
            {r:"Daniel 2:21", t:"Él muda los tiempos y las edades; quita reyes, y pone reyes; da la sabiduría a los sabios, y la ciencia a los entendidos.", c:"Sabiduría"},
            {r:"Proverbios 3:6", t:"Reconócelo en todos tus caminos, y él enderezará tus veredas.", c:"Sabiduría"},
            {r:"Proverbios 8:11", t:"Porque mejor es la sabiduría que las piedras preciosas; y todo lo que se puede desear, no es de compararse con ella.", c:"Sabiduría"},
            {r:"Proverbios 14:1", t:"La mujer sabia edifica su casa; mas la necia con sus manos la derriba.", c:"Sabiduría"},
            {r:"Proverbios 15:1", t:"La blanda respuesta quita la ira; mas la palabra áspera hace subir el furor.", c:"Sabiduría"},
            {r:"Proverbios 15:33", t:"El temor de Jehová es enseñanza de sabiduría; y a la honra precede la humildad.", c:"Sabiduría"},
            {r:"Proverbios 17:27", t:"El que ahorra sus palabras tiene sabiduría; de espíritu prudente es el hombre entendido.", c:"Sabiduría"},
            {r:"Proverbios 17:28", t:"Aun el necio, cuando calla, es contado por sabio; el que cierra sus labios es entendido.", c:"Sabiduría"},

        function setDifficulty(mode) { currentDifficulty = mode; }
        function setCarColor(color) { currentCarColor = color; }
        
        function openVersesModal() {
            const list = document.getElementById('verses-list'); list.innerHTML = '';
            defaultVerses.forEach((v, i) => {
                list.innerHTML += `<div class="p-3 bg-indigo-900/40 rounded-xl"><p class="text-xs text-slate-100">"${v}"</p></div>`;
            });
            document.getElementById('verses-modal').style.display = 'flex';
        }
        function closeVersesModal() { document.getElementById('verses-modal').style.display = 'none'; }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-play-screen').style.display = 'flex';
            canvas = document.getElementById('gameCanvas'); ctx = canvas.getContext('2d');
            canvas.width = document.getElementById('game-container').clientWidth;
            canvas.height = document.getElementById('game-container').clientHeight;
            car.x = canvas.width / 2 - car.width / 2; car.y = canvas.height - car.height - 20;
            gameActive = true; score = 0; fuel = 100; distance = 0; obstacles = []; parchments = [];
            gameLoop();
        }
  let audioCtx = null;

        function initAudio() {
            // El AudioContext se inicializa de forma segura ÚNICAMENTE tras una interacción del usuario
            if (!audioCtx) {
                try {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                } catch (err) {
                    console.warn("La Web Audio API no está soportada o fue bloqueada por el navegador:", err);
                }
            }
        }

        function playSound(type) {
            // Si el contexto de audio se bloqueó por seguridad del hosting, el juego no se congela, continúa en silencio.
            if (!audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                const now = audioCtx.currentTime;

                if (type === 'hit') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.3);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (type === 'scroll') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now); 
                    osc.frequency.setValueAtTime(659.25, now + 0.1); 
                    osc.frequency.setValueAtTime(783.99, now + 0.2); 
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                    osc.start(now);
                    osc.stop(now + 0.35);
                } else if (type === 'success') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(440, now); 
                    osc.frequency.setValueAtTime(554, now + 0.08); 
                    osc.frequency.setValueAtTime(659, now + 0.16); 
                    osc.frequency.setValueAtTime(880, now + 0.24); 
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                } else if (type === 'fail') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(80, now + 0.5);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                } else if (type === 'victory') {
                    const notes = [523, 587, 659, 698, 783, 880, 987, 1046];
                    notes.forEach((freq, i) => {
                        const o = audioCtx.createOscillator();
                        const g = audioCtx.createGain();
                        o.connect(g);
                        g.connect(audioCtx.destination);
                        o.frequency.setValueAtTime(freq, now + (i * 0.12));
                        g.gain.setValueAtTime(0.15, now + (i * 0.12));
                        g.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.12) + 0.2);
                        o.start(now + (i * 0.12));
                        o.stop(now + (i * 0.12) + 0.2);
                    });
                }
        function gameLoop() { if (!gameActive) return; updateGame(); drawGame(); animationFrameId = requestAnimationFrame(gameLoop); }

        function updateGame() {
            fuel -= 0.005; distance += 0.1;
            if (fuel <= 0) gameOver(false);
            if (distance >= targetDistance) gameOver(true);

            if (keys['ArrowLeft'] || touchLeft) car.x -= car.speed;
            if (keys['ArrowRight'] || touchRight) car.x += car.speed;

            const margin = canvas.width * 0.15;
            if (car.x < margin) car.x = margin;
            if (car.x > canvas.width - margin - car.width) car.x = canvas.width - margin - car.width;

            if (Math.random() < 0.015 && obstacles.length < 3) {
                obstacles.push({ x: margin + Math.random() * (canvas.width - 2*margin - 30), y: -40, width: 30, height: 30, speed: 3 });
            }
            obstacles.forEach((obs, idx) => {
                obs.y += obs.speed;
                if (checkCollision(car, obs)) { obstacles.splice(idx, 1); fuel -= 15; }
                if (obs.y > canvas.height) obstacles.splice(idx, 1);
            });

            if (Math.random() < 0.008 && parchments.length < 1) {
                parchments.push({ x: margin + Math.random() * (canvas.width - 2*margin - 25), y: -40, width: 25, height: 25, speed: 3 });
            }
            parchments.forEach((p, idx) => {
                p.y += p.speed;
                if (checkCollision(car, p)) { parchments.splice(idx, 1); triggerTrivia(); }
                if (p.y > canvas.height) parchments.splice(idx, 1);
            });

            document.getElementById('hud-score').innerText = `Score: ${Math.round(score)}`;
            document.getElementById('hud-fuel-percent').innerText = `${Math.round(fuel)}%`;
            document.getElementById('fuel-bar').style.width = `${fuel}%`;
            document.getElementById('hud-distance').innerText = `${Math.round(distance)} / ${targetDistance}m`;
            document.getElementById('distance-bar').style.width = `${(distance/targetDistance)*100}%`;
        }

        function drawGame() {
            // 1. Dibujar Césped lateral (Fondo)
            ctx.fillStyle = "#14532d"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 2. Dibujar Carretera
            const rW = canvas.width * 0.7; 
            const rX = canvas.width * 0.15;
            ctx.fillStyle = "#334155"; 
            ctx.fillRect(rX, 0, rW, canvas.height);
            
            // Líneas amarillas centrales en movimiento
            ctx.fillStyle = "#facc15"; 
            backgroundY += 4; 
            if (backgroundY >= 40) backgroundY = 0;
            for (let y = -40 + backgroundY; y < canvas.height; y += 40) { 
                ctx.fillRect(canvas.width / 2 - 2, y, 4, 20); 
            }
            
            // 3. ¡DIBUJAR EL CARRITO DETALLADO!
            ctx.save();
            ctx.translate(car.x, car.y);
            
            // Color base elegido por el usuario
            ctx.fillStyle = currentCarColor === 'blue' ? '#3b82f6' : currentCarColor === 'yellow' ? '#eab308' : currentCarColor === 'green' ? '#10b981' : '#ef4444';
            ctx.beginPath();
            ctx.roundRect(0, 0, car.width, car.height, 8); // Cuerpo del auto
            ctx.fill();
            
            // Llantas (Negras)
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(-3, 10, 4, 14);  // Delantera Izq
            ctx.fillRect(car.width - 1, 10, 4, 14); // Delantera Der
            ctx.fillRect(-3, 55, 4, 14);  // Trasera Izq
            ctx.fillRect(car.width - 1, 55, 4, 14); // Trasera Der
            
            // Parabrisas / Ventana (Azul celeste)
            ctx.fillStyle = "#38bdf8";
            ctx.beginPath();
            ctx.roundRect(5, 15, car.width - 10, 18, 4);
            ctx.fill();
            
            // Luces delanteras (Amarillas brillantes)
            ctx.fillStyle = "#fef08a";
            ctx.fillRect(6, 0, 6, 3);
            ctx.fillRect(car.width - 12, 0, 6, 3);
            ctx.restore();

            // 4. ¡DIBUJAR EL PERGAMINO / BIBLIA SAGRADA!
            parchments.forEach(p => {
                ctx.save();
                // Cuerpo del pergamino (Papel viejo/amarillo)
                ctx.fillStyle = "#fef08a";
                ctx.beginPath();
                ctx.roundRect(p.x, p.y + 3, p.width, p.height - 6, 3);
                ctx.fill();
                
                // Rodillos laterales de madera (Café)
                ctx.fillStyle = "#b45309";
                ctx.fillRect(p.x - 2, p.y, 4, p.height); // Rodillo izquierdo
                ctx.fillRect(p.x + p.width - 2, p.y, 4, p.height); // Rodillo derecho
                
                // Cruz santa en el centro del pergamino (Roja)
                ctx.fillStyle = "#dc2626";
                ctx.fillRect(p.x + (p.width/2) - 2, p.y + 6, 4, p.height - 12); // Línea vertical
                ctx.fillRect(p.x + (p.width/2) - 5, p.y + 9, 10, 3); // Línea horizontal
                ctx.restore();
            });

            // 5. Dibujar Obstáculos (Rocas peligrosas)
            ctx.fillStyle = "#64748b"; 
            obstacles.forEach(o => {
                ctx.save();
                ctx.beginPath();
                ctx.arc(o.x + (o.width/2), o.y + (o.height/2), o.width/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function checkCollision(r1, r2) { return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y; }

        function triggerTrivia() {
            gameActive = false; const qList = questions[currentDifficulty]; const q = qList[Math.floor(Math.random() * qList.length)];
            document.getElementById('trivia-question').innerText = q.q;
            const opts = document.getElementById('trivia-options'); opts.innerHTML = '';
            q.a.forEach((opt, i) => {
                opts.innerHTML += `<button onclick="answerTrivia(${i === q.correct})" class="w-full bg-indigo-900 py-2 rounded-xl text-xs">${opt}</button>`;
            });
            document.getElementById('trivia-modal').style.display = 'flex';
        }
        function answerTrivia(isCorrect) {
            document.getElementById('trivia-modal').style.display = 'none';
            if (isCorrect) { fuel = Math.min(100, fuel + 20); score += 100; } else { fuel = Math.max(0, fuel - 10); }
            gameActive = true; gameLoop();
        }

        function gameOver(v) {
            gameActive = false; document.getElementById('result-title').innerText = v ? "¡Viaje Exitoso!" : "Fe Agotada";
            document.getElementById('result-message').innerText = v ? "Llegaste a la meta con éxito." : "Las dudas frenaron tu viaje.";
            document.getElementById('result-modal').style.display = 'flex';
        }
        function restartToMenu() { document.getElementById('result-modal').style.display = 'none'; document.getElementById('game-play-screen').style.display = 'none'; document.getElementById('start-screen').style.display = 'flex'; }

        window.addEventListener('keydown', e => keys[e.key] = true); window.addEventListener('keyup', e => keys[e.key] = false);
        let touchLeft = false; let touchRight = false;
        document.getElementById('btn-left').addEventListener('touchstart', () => touchLeft = true); document.getElementById('btn-left').addEventListener('touchend', () => touchLeft = false);
        document.getElementById('btn-right').addEventListener('touchstart', () => touchRight = true); document.getElementById('btn-right').addEventListener('touchend', () => touchRight = false);
    </script>
</body>
