<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camino de Fe - Biblia sobre Ruedas</title>
    <!-- Tailwind CSS (Para activar todos los colores y diseños modernos) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght=500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Quicksand', sans-serif; user-select: none; -webkit-user-select: none; }
        .font-kids { font-family: 'Fredoka One', cursive; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .floating { animation: float 3s ease-in-out infinite; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(30, 27, 75, 0.5); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.4); border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-center items-center p-3 overflow-x-hidden">

    <div class="relative w-full max-w-md mx-auto my-auto flex flex-col items-center">
        
        <!-- PANTALLA DE INICIO / MENÚ PRINCIPAL -->
        <div id="start-screen" class="w-full bg-indigo-950/95 p-6 rounded-3xl shadow-2xl border border-indigo-500/30 text-center flex flex-col justify-between">
            <div>
                <div class="flex justify-center mb-4">
                    <div class="w-20 h-20 bg-amber-400 rounded-full flex items-center justify-center shadow-lg floating">
                        <i class="fa-solid fa-car-side text-indigo-950 text-4xl"></i>
                    </div>
                </div>
                
                <h1 class="font-kids text-4xl font-extrabold text-amber-400 tracking-wide mb-1 uppercase">Camino de Fe</h1>
                <p class="text-indigo-200 text-sm font-semibold tracking-wider mb-6">Biblia sobre Ruedas</p>

                <!-- Selección de Modo -->
                <div class="space-y-3 mb-6">
                    <label class="font-kids text-amber-300 block text-center mb-1 font-medium">¿Quién va a jugar hoy?</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="btn-mode-kids" onclick="setDifficulty('kids')" class="flex flex-col items-center justify-center p-3 bg-amber-500 text-indigo-950 rounded-2xl border-2 border-amber-300 shadow-md transition-all">
                            <i class="fa-solid fa-child text-2xl mb-1"></i>
                            <span class="font-kids font-bold text-xs">Modo Niños</span>
                        </button>
                        <button type="button" id="btn-mode-adults" onclick="setDifficulty('adults')" class="flex flex-col items-center justify-center p-3 bg-indigo-900/60 text-indigo-200 rounded-2xl border-2 border-indigo-700 shadow-md transition-all">
                            <i class="fa-solid fa-graduation-cap text-2xl mb-1"></i>
                            <span class="font-kids font-bold text-xs">Modo Adultos</span>
                        </button>
                    </div>
                </div>

                <!-- Selección de Color -->
                <div class="mb-6">
                    <label class="font-kids text-amber-300 block text-center mb-2 font-medium">Elige el color de tu Carrito</label>
                    <div class="flex justify-center gap-4">
                        <button type="button" id="car-red" onclick="setCarColor('red')" class="w-10 h-10 rounded-full bg-red-500 border-4 border-white shadow-md"></button>
                        <button type="button" id="car-blue" onclick="setCarColor('blue')" class="w-10 h-10 rounded-full bg-blue-500 border-4 border-transparent shadow-md"></button>
                        <button type="button" id="car-yellow" onclick="setCarColor('yellow')" class="w-10 h-10 rounded-full bg-yellow-400 border-4 border-transparent shadow-md"></button>
                        <button type="button" id="car-green" onclick="setCarColor('green')" class="w-10 h-10 rounded-full bg-emerald-500 border-4 border-transparent shadow-md"></button>
                    </div>
                </div>
            </div>

            <!-- Botones de Acción -->
            <div class="space-y-3">
                <button type="button" onclick="startGame()" class="w-full bg-gradient-to-r from-amber-500 to-yellow-400 text-indigo-950 font-kids text-xl font-black py-4 px-6 rounded-2xl shadow-lg border-b-4 border-amber-700 active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-play"></i> ¡INICIAR VIAJE!
                </button>
                <button type="button" onclick="openVersesModal()" class="w-full bg-indigo-900/40 text-indigo-200 font-semibold py-3 px-6 rounded-2xl border border-indigo-700/50 text-sm">
                    <i class="fa-solid fa-book-bible text-amber-400"></i> Biblioteca de Fe (200 Versículos)
                </button>
            </div>
        </div>

        <!-- PANTALLA DE JUEGO ACTIVO -->
        <div id="game-play-screen" style="display: none;" class="w-full flex flex-col">
            <div class="relative w-full bg-indigo-950 p-4 rounded-t-3xl border-b border-indigo-500/30 mx-auto z-20">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-2 bg-indigo-900/60 border border-indigo-400/20 px-3 py-1 rounded-full">
                        <i class="fa-solid fa-map-location-dot text-amber-400"></i>
                        <span id="hud-station-name" class="font-kids text-xs font-semibold text-amber-200">Arca de Noé</span>
                    </div>
                    <div class="flex items-center gap-2 bg-indigo-900/60 border border-indigo-400/20 px-3 py-1 rounded-full">
                        <i class="fa-solid fa-star text-amber-400"></i>
                        <span id="hud-score" class="font-kids text-xs font-bold text-white">Score: 0</span>
                    </div>
                </div>
                <div class="space-y-1 mb-2">
                    <div class="flex justify-between text-xs font-semibold">
                        <span class="text-emerald-400"><i class="fa-solid fa-gas-pump"></i> Combustible de Fe</span>
                        <span id="hud-fuel-percent" class="text-emerald-400">100%</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-2.5 overflow-hidden">
                        <div id="fuel-bar" class="bg-gradient-to-r from-emerald-500 to-teal-400 h-full w-full"></div>
                    </div>
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between text-xs font-semibold text-indigo-200">
                        <span>Progreso hacia la Meta</span>
                        <span id="hud-distance" class="font-mono">0 / 1000m</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-2 overflow-hidden">
                        <div id="distance-bar" class="bg-gradient-to-r from-amber-400 to-yellow-300 h-full w-0"></div>
                    </div>
                </div>
            </div>

            <div id="game-container" class="relative w-full h-[380px] bg-slate-950 overflow-hidden rounded-b-3xl shadow-2xl z-10">
                <canvas id="gameCanvas" class="w-full h-full block bg-slate-950"></canvas>
            </div>

            <!-- Controles Móviles -->
            <div class="w-full flex justify-between items-center px-4 py-4 z-20">
                <button type="button" id="btn-left" class="w-20 h-20 bg-indigo-800/80 text-white rounded-2xl shadow-lg flex items-center justify-center">
                    <i class="fa-solid fa-arrow-left text-3xl"></i>
                </button>
                <button type="button" id="btn-right" class="w-20 h-20 bg-indigo-800/80 text-white rounded-2xl shadow-lg flex items-center justify-center">
                    <i class="fa-solid fa-arrow-right text-3xl"></i>
                </button>
            </div>
        </div>

        <!-- MODAL TRIVIA -->
        <div id="trivia-modal" style="display: none;" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-indigo-950 border border-indigo-400/30 rounded-3xl p-6 max-w-sm w-full text-center">
                <h3 class="font-kids text-xl text-amber-400 mb-2">¡Pergamino de Sabiduría!</h3>
                <p id="trivia-question" class="text-white text-sm font-semibold mb-6">¿Pregunta de Fe?</p>
                <div id="trivia-options" class="space-y-3"></div>
            </div>
        </div>

        <!-- MODAL BIBLIOTECA -->
        <div id="verses-modal" style="display: none;" class="fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-indigo-950 border border-indigo-400/30 rounded-3xl p-6 max-w-sm w-full h-[80vh] flex flex-col justify-between">
                <h3 class="font-kids text-2xl text-amber-400 mb-2">Promesas de Fe</h3>
                <div id="verses-list" class="flex-1 overflow-y-auto space-y-3 pr-1 text-left"></div>
                <button type="button" onclick="closeVersesModal()" class="w-full bg-indigo-900/60 text-indigo-200 py-3 rounded-xl font-bold mt-4">Volver al Menú</button>
            </div>
        </div>

        <!-- MODAL RESULTADOS -->
        <div id="result-modal" style="display: none;" class="fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-indigo-950 border border-indigo-400/30 rounded-3xl p-6 max-w-sm w-full text-center">
                <h3 id="result-title" class="font-kids text-2xl text-amber-400 mb-2">¡Viaje Terminado!</h3>
                <p id="result-message" class="text-indigo-200 text-sm mb-6"></p>
                <button type="button" onclick="restartToMenu()" class="w-full bg-gradient-to-r from-amber-500 to-yellow-400 text-indigo-950 font-kids py-3 rounded-xl font-bold">Jugar de Nuevo</button>
            </div>
        </div>

    </div>

    <script>
        let currentDifficulty = 'kids'; let currentCarColor = 'red'; let gameActive = false; let score = 0; let fuel = 100; let distance = 0; const targetDistance = 1000;
        let canvas, ctx; let animationFrameId; let car = { x: 0, y: 0, width: 45, height: 80, speed: 5 };
        let obstacles = []; let parchments = []; let backgroundY = 0; let keys = {};

        const questions = {
            kids: [
                { q: "¿Quién construyó el Arca para salvarse del gran diluvio?", a: ["Moisés", "Noé", "David"], correct: 1 },
                { q: "¿Quién derrotó al gigante Goliat usando una honda?", a: ["David", "Saúl", "Salomón"], correct: 0 },
                { q: "¿Cuántos discípulos principales tenía Jesús?", a: ["10", "12", "7"], correct: 1 }
            ],
            adults: [
                { q: "¿En qué libro bíblico encontramos la reconstrucción de las murallas de Jerusalén?", a: ["Nehemías", "Esdras", "Jeremías"], correct: 0 },
                { q: "¿Quién escribió la mayor cantidad de cartas en el Nuevo Testamento?", a: ["Pedro", "Juan", "Pablo"], correct: 2 }
            ]
        };

        const defaultVerses = [
            "Filipenses 4:13 - Todo lo puedo en Cristo que me fortalece.",
            "Salmo 23:1 - Jehová es mi pastor; nada me faltará.",
            "Proverbios 3:5 - Fíate de Jehová de todo tu corazón."
        ];
        const stations = ["Arca de Noé", "Monte Sinaí", "Jericó", "Nazaret"];

        function setDifficulty(mode) { currentDifficulty = mode; }
        function setCarColor(color) { currentCarColor = color; }
        
        function openVersesModal() {
            const list = document.getElementById('verses-list'); list.innerHTML = '';
            defaultVerses.forEach((v, i) => {
                list.innerHTML += `<div class="p-3 bg-indigo-900/40 rounded-xl"><p class="text-xs text-slate-100">"${v}"</p></div>`;
            });
            document.getElementById('verses-modal').style.display = 'flex';
        }
        function closeVersesModal() { document.getElementById('verses-modal').style.display = 'none'; }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-play-screen').style.display = 'flex';
            canvas = document.getElementById('gameCanvas'); ctx = canvas.getContext('2d');
            canvas.width = document.getElementById('game-container').clientWidth;
            canvas.height = document.getElementById('game-container').clientHeight;
            car.x = canvas.width / 2 - car.width / 2; car.y = canvas.height - car.height - 20;
            gameActive = true; score = 0; fuel = 100; distance = 0; obstacles = []; parchments = [];
            gameLoop();
        }

        function gameLoop() { if (!gameActive) return; updateGame(); drawGame(); animationFrameId = requestAnimationFrame(gameLoop); }

        function updateGame() {
            fuel -= 0.005; distance += 0.1;
            if (fuel <= 0) gameOver(false);
            if (distance >= targetDistance) gameOver(true);

            if (keys['ArrowLeft'] || touchLeft) car.x -= car.speed;
            if (keys['ArrowRight'] || touchRight) car.x += car.speed;

            const margin = canvas.width * 0.15;
            if (car.x < margin) car.x = margin;
            if (car.x > canvas.width - margin - car.width) car.x = canvas.width - margin - car.width;

            if (Math.random() < 0.015 && obstacles.length < 3) {
                obstacles.push({ x: margin + Math.random() * (canvas.width - 2*margin - 30), y: -40, width: 30, height: 30, speed: 3 });
            }
            obstacles.forEach((obs, idx) => {
                obs.y += obs.speed;
                if (checkCollision(car, obs)) { obstacles.splice(idx, 1); fuel -= 15; }
                if (obs.y > canvas.height) obstacles.splice(idx, 1);
            });

            if (Math.random() < 0.008 && parchments.length < 1) {
                parchments.push({ x: margin + Math.random() * (canvas.width - 2*margin - 25), y: -40, width: 25, height: 25, speed: 3 });
            }
            parchments.forEach((p, idx) => {
                p.y += p.speed;
                if (checkCollision(car, p)) { parchments.splice(idx, 1); triggerTrivia(); }
                if (p.y > canvas.height) parchments.splice(idx, 1);
            });

            document.getElementById('hud-score').innerText = `Score: ${Math.round(score)}`;
            document.getElementById('hud-fuel-percent').innerText = `${Math.round(fuel)}%`;
            document.getElementById('fuel-bar').style.width = `${fuel}%`;
            document.getElementById('hud-distance').innerText = `${Math.round(distance)} / ${targetDistance}m`;
            document.getElementById('distance-bar').style.width = `${(distance/targetDistance)*100}%`;
        }

        function drawGame() {
            // 1. Dibujar Césped lateral (Fondo)
            ctx.fillStyle = "#14532d"; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 2. Dibujar Carretera
            const rW = canvas.width * 0.7; 
            const rX = canvas.width * 0.15;
            ctx.fillStyle = "#334155"; 
            ctx.fillRect(rX, 0, rW, canvas.height);
            
            // Líneas amarillas centrales en movimiento
            ctx.fillStyle = "#facc15"; 
            backgroundY += 4; 
            if (backgroundY >= 40) backgroundY = 0;
            for (let y = -40 + backgroundY; y < canvas.height; y += 40) { 
                ctx.fillRect(canvas.width / 2 - 2, y, 4, 20); 
            }
            
            // 3. ¡DIBUJAR EL CARRITO DETALLADO!
            ctx.save();
            ctx.translate(car.x, car.y);
            
            // Color base elegido por el usuario
            ctx.fillStyle = currentCarColor === 'blue' ? '#3b82f6' : currentCarColor === 'yellow' ? '#eab308' : currentCarColor === 'green' ? '#10b981' : '#ef4444';
            ctx.beginPath();
            ctx.roundRect(0, 0, car.width, car.height, 8); // Cuerpo del auto
            ctx.fill();
            
            // Llantas (Negras)
            ctx.fillStyle = "#0f172a";
            ctx.fillRect(-3, 10, 4, 14);  // Delantera Izq
            ctx.fillRect(car.width - 1, 10, 4, 14); // Delantera Der
            ctx.fillRect(-3, 55, 4, 14);  // Trasera Izq
            ctx.fillRect(car.width - 1, 55, 4, 14); // Trasera Der
            
            // Parabrisas / Ventana (Azul celeste)
            ctx.fillStyle = "#38bdf8";
            ctx.beginPath();
            ctx.roundRect(5, 15, car.width - 10, 18, 4);
            ctx.fill();
            
            // Luces delanteras (Amarillas brillantes)
            ctx.fillStyle = "#fef08a";
            ctx.fillRect(6, 0, 6, 3);
            ctx.fillRect(car.width - 12, 0, 6, 3);
            ctx.restore();

            // 4. ¡DIBUJAR EL PERGAMINO / BIBLIA SAGRADA!
            parchments.forEach(p => {
                ctx.save();
                // Cuerpo del pergamino (Papel viejo/amarillo)
                ctx.fillStyle = "#fef08a";
                ctx.beginPath();
                ctx.roundRect(p.x, p.y + 3, p.width, p.height - 6, 3);
                ctx.fill();
                
                // Rodillos laterales de madera (Café)
                ctx.fillStyle = "#b45309";
                ctx.fillRect(p.x - 2, p.y, 4, p.height); // Rodillo izquierdo
                ctx.fillRect(p.x + p.width - 2, p.y, 4, p.height); // Rodillo derecho
                
                // Cruz santa en el centro del pergamino (Roja)
                ctx.fillStyle = "#dc2626";
                ctx.fillRect(p.x + (p.width/2) - 2, p.y + 6, 4, p.height - 12); // Línea vertical
                ctx.fillRect(p.x + (p.width/2) - 5, p.y + 9, 10, 3); // Línea horizontal
                ctx.restore();
            });

            // 5. Dibujar Obstáculos (Rocas peligrosas)
            ctx.fillStyle = "#64748b"; 
            obstacles.forEach(o => {
                ctx.save();
                ctx.beginPath();
                ctx.arc(o.x + (o.width/2), o.y + (o.height/2), o.width/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        function checkCollision(r1, r2) { return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y; }

        function triggerTrivia() {
            gameActive = false; const qList = questions[currentDifficulty]; const q = qList[Math.floor(Math.random() * qList.length)];
            document.getElementById('trivia-question').innerText = q.q;
            const opts = document.getElementById('trivia-options'); opts.innerHTML = '';
            q.a.forEach((opt, i) => {
                opts.innerHTML += `<button onclick="answerTrivia(${i === q.correct})" class="w-full bg-indigo-900 py-2 rounded-xl text-xs">${opt}</button>`;
            });
            document.getElementById('trivia-modal').style.display = 'flex';
        }
        function answerTrivia(isCorrect) {
            document.getElementById('trivia-modal').style.display = 'none';
            if (isCorrect) { fuel = Math.min(100, fuel + 20); score += 100; } else { fuel = Math.max(0, fuel - 10); }
            gameActive = true; gameLoop();
        }

        function gameOver(v) {
            gameActive = false; document.getElementById('result-title').innerText = v ? "¡Viaje Exitoso!" : "Fe Agotada";
            document.getElementById('result-message').innerText = v ? "Llegaste a la meta con éxito." : "Las dudas frenaron tu viaje.";
            document.getElementById('result-modal').style.display = 'flex';
        }
        function restartToMenu() { document.getElementById('result-modal').style.display = 'none'; document.getElementById('game-play-screen').style.display = 'none'; document.getElementById('start-screen').style.display = 'flex'; }

        window.addEventListener('keydown', e => keys[e.key] = true); window.addEventListener('keyup', e => keys[e.key] = false);
        let touchLeft = false; let touchRight = false;
        document.getElementById('btn-left').addEventListener('touchstart', () => touchLeft = true); document.getElementById('btn-left').addEventListener('touchend', () => touchLeft = false);
        document.getElementById('btn-right').addEventListener('touchstart', () => touchRight = true); document.getElementById('btn-right').addEventListener('touchend', () => touchRight = false);
    </script>
</body>
</html>
