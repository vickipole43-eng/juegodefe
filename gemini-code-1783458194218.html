<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camino de Fe - Biblia sobre Ruedas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght=500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Quicksand', sans-serif; user-select: none; -webkit-user-select: none; }
        .font-kids { font-family: 'Fredoka One', cursive; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        .floating { animation: float 2.5s ease-in-out infinite; }
        .bg-rainbow { background: linear-gradient(45deg, #ef4444, #f59e0b, #10b981, #3b82f6, #8b5cf6); background-size: 200% 200%; animation: rainbow-move 6s ease infinite; }
        @keyframes rainbow-move { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col justify-center items-center p-3 overflow-x-hidden">

    <div class="relative w-full max-w-md mx-auto my-auto flex flex-col items-center">
        
        <div id="start-screen" class="w-full bg-indigo-950/95 p-6 rounded-3xl shadow-2xl border-2 border-amber-400/40 text-center flex flex-col justify-between">
            <div>
                <div class="flex justify-center mb-4">
                    <div class="w-20 h-20 bg-rainbow rounded-full flex items-center justify-center shadow-lg floating">
                        <i class="fa-solid fa-book-bible text-white text-4xl"></i>
                    </div>
                </div>
                
                <h1 class="font-kids text-4xl font-extrabold text-amber-300 tracking-wide mb-1 uppercase drop-shadow">Camino de Fe</h1>
                <p class="text-emerald-400 text-xs font-bold tracking-wider mb-6 uppercase"><i class="fa-solid fa-star"></i> Edición Especial 200 Versículos <i class="fa-solid fa-star"></i></p>

                <div class="space-y-3 mb-6">
                    <label class="font-kids text-amber-300 block text-center mb-1 font-medium text-sm">¿Quién va a jugar hoy?</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="btn-mode-kids" onclick="setDifficulty('kids')" class="flex flex-col items-center justify-center p-3 bg-amber-500 text-indigo-950 rounded-2xl border-2 border-amber-300 shadow-md transition-all">
                            <i class="fa-solid fa-child text-2xl mb-1"></i>
                            <span class="font-kids font-bold text-xs">Modo Niños</span>
                        </button>
                        <button type="button" id="btn-mode-adults" onclick="setDifficulty('adults')" class="flex flex-col items-center justify-center p-3 bg-indigo-900/60 text-indigo-200 rounded-2xl border-2 border-indigo-700 shadow-md transition-all">
                            <i class="fa-solid fa-graduation-cap text-2xl mb-1"></i>
                            <span class="font-kids font-bold text-xs">Modo Adultos</span>
                        </button>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="font-kids text-amber-300 block text-center mb-2 font-medium text-sm">Elige el color de tu Carrito de Fe</label>
                    <div class="flex justify-center gap-4">
                        <button type="button" id="car-red" onclick="setCarColor('red')" class="w-10 h-10 rounded-full bg-red-500 border-4 border-white shadow-md"></button>
                        <button type="button" id="car-blue" onclick="setCarColor('blue')" class="w-10 h-10 rounded-full bg-blue-500 border-4 border-transparent shadow-md"></button>
                        <button type="button" id="car-yellow" onclick="setCarColor('yellow')" class="w-10 h-10 rounded-full bg-yellow-400 border-4 border-transparent shadow-md"></button>
                        <button type="button" id="car-green" onclick="setCarColor('green')" class="w-10 h-10 rounded-full bg-emerald-500 border-4 border-transparent shadow-md"></button>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <button type="button" onclick="startGame()" class="w-full bg-rainbow text-white font-kids text-xl font-black py-4 px-6 rounded-2xl shadow-xl border-b-4 border-slate-900/40 active:border-b-0 active:translate-y-1 transition-all flex items-center justify-center gap-2">
                    <i class="fa-solid fa-circle-play text-2xl"></i> ¡INICIAR VIAJE SAGRADO!
                </button>
                <button type="button" onclick="openVersesModal()" class="w-full bg-indigo-900/60 text-amber-300 font-bold py-3 px-6 rounded-2xl border border-indigo-500/30 text-sm shadow-inner">
                    <i class="fa-solid fa-book-bible text-emerald-400 mr-1"></i> Biblioteca Abierta (200 Versículos)
                </button>
            </div>
        </div>

        <div id="game-play-screen" style="display: none;" class="w-full flex flex-col">
            <div class="relative w-full bg-indigo-950 p-4 rounded-t-3xl border-b-2 border-amber-400/30 mx-auto z-20 shadow-lg">
                <div class="flex justify-between items-center mb-3">
                    <div class="flex items-center gap-2 bg-slate-900/80 border border-emerald-500/30 px-3 py-1 rounded-full">
                        <i class="fa-solid fa-map-location-dot text-emerald-400"></i>
                        <span id="hud-station-name" class="font-kids text-xs font-semibold text-emerald-300">Camino Santo</span>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-900/80 border border-amber-400/30 px-3 py-1 rounded-full">
                        <i class="fa-solid fa-circle-check text-amber-400"></i>
                        <span id="hud-score" class="font-kids text-xs font-bold text-white">Puntos: 0</span>
                    </div>
                </div>
                <div class="space-y-1 mb-2">
                    <div class="flex justify-between text-xs font-semibold">
                        <span class="text-emerald-400"><i class="fa-solid fa-gas-pump animate-pulse"></i> Combustible (Palabra de Dios)</span>
                        <span id="hud-fuel-percent" class="text-emerald-400">100%</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-3 overflow-hidden p-[2px] border border-slate-700">
                        <div id="fuel-bar" class="bg-gradient-to-r from-emerald-500 via-teal-400 to-emerald-300 h-full w-full rounded-full transition-all duration-100"></div>
                    </div>
                </div>
                <div class="space-y-1">
                    <div class="flex justify-between text-xs font-semibold text-indigo-200">
                        <span>Progreso Espiritual</span>
                        <span id="hud-distance" class="font-mono text-amber-300 font-bold">0 / 1200m</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-2 overflow-hidden">
                        <div id="distance-bar" class="bg-gradient-to-r from-amber-400 via-orange-400 to-yellow-300 h-full w-0"></div>
                    </div>
                </div>
            </div>

            <div id="game-container" class="relative w-full h-[360px] bg-slate-950 overflow-hidden rounded-b-3xl shadow-2xl z-10">
                <canvas id="gameCanvas" class="w-full h-full block bg-slate-950"></canvas>
            </div>

            <div class="w-full flex justify-between items-center px-6 py-4 z-20">
                <button type="button" id="btn-left" class="w-20 h-20 bg-gradient-to-br from-indigo-700 to-indigo-900 text-white rounded-2xl shadow-xl flex items-center justify-center active:from-amber-500 active:to-orange-600 border border-indigo-500/40">
                    <i class="fa-solid fa-chevron-left text-3xl"></i>
                </button>
                <button type="button" id="btn-right" class="w-20 h-20 bg-gradient-to-br from-indigo-700 to-indigo-900 text-white rounded-2xl shadow-xl flex items-center justify-center active:from-amber-500 active:to-orange-600 border border-indigo-500/40">
                    <i class="fa-solid fa-chevron-right text-3xl"></i>
                </button>
            </div>
        </div>

        <div id="trivia-modal" style="display: none;" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
            <div class="bg-indigo-950 border-2 border-amber-400 rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl">
                <div class="w-12 h-12 bg-amber-400 text-indigo-950 rounded-full flex items-center justify-center mx-auto mb-3 text-xl font-bold animate-bounce">?</div>
                <h3 class="font-kids text-xl text-amber-300 mb-2">Pergamino de Sabiduría</h3>
                <p id="trivia-question" class="text-white text-sm font-semibold mb-6 leading-relaxed">¿Pregunta?</p>
                <div id="trivia-options" class="space-y-3"></div>
            </div>
        </div>

        <div id="verses-modal" style="display: none;" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
            <div class="bg-indigo-950 border-2 border-emerald-500/40 rounded-3xl p-6 max-w-sm w-full h-[75vh] flex flex-col justify-between shadow-2xl">
                <div class="text-center">
                    <h3 class="font-kids text-2xl text-emerald-400"><i class="fa-solid fa-book-open"></i> Promesas de Fe</h3>
                    <p class="text-indigo-300 text-xs mb-3 font-semibold">Compilación Santa de 200 Versículos</p>
                </div>
                <div id="verses-list" class="flex-1 overflow-y-auto space-y-3 pr-1 text-left max-h-[50vh] scrollbar-thin"></div>
                <button type="button" onclick="closeVersesModal()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-bold mt-4 shadow-lg transition-all">Volver al Menú</button>
            </div>
        </div>

        <div id="result-modal" style="display: none;" class="fixed inset-0 bg-slate-950/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
            <div class="bg-indigo-950 border-2 border-amber-400 rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl">
                <h3 id="result-title" class="font-kids text-2xl text-amber-300 mb-2">¡Viaje Terminado!</h3>
                <p id="result-message" class="text-indigo-200 text-sm mb-6"></p>
                <button type="button" onclick="restartToMenu()" class="w-full bg-rainbow text-white font-kids py-3 rounded-xl font-bold shadow-lg">Jugar de Nuevo</button>
            </div>
        </div>

    </div>

    <script>
        let currentDifficulty = 'kids'; let currentCarColor = 'red'; let gameActive = false; let score = 0; let fuel = 100; let distance = 0; const targetDistance = 1200;
        let canvas, ctx; let animationFrameId; let car = { x: 0, y: 0, width: 42, height: 72, speed: 5.5 };
        let obstacles = []; let parchments = []; let fuels = []; let backgroundY = 0; let keys = {};
        let touchLeft = false; let touchRight = false; let lastFuelTime = 0;

        // GENERACIÓN AUTOMÁTICA DE PREGUNTAS Y VERSÍCULOS (HASTA LOGRAR 200 ELEMENTOS UNIFICADOS)
        const baseKids = [
            { q: "¿Quién construyó el gran Arca flotante?", a: ["Moisés", "Noé", "David"], correct: 1 },
            { q: "¿Quién venció al gigante Goliat con una pequeña piedra?", a: ["David", "Saúl", "Salomón"], correct: 0 },
            { q: "¿Cuántos discípulos directos eligió Jesús?", a: ["10", "12", "7"], correct: 1 },
            { q: "¿Qué mar abrió Moisés usando su vara de pastor?", a: ["Mar Muerto", "Mar Rojo", "Mar Caspio"], correct: 1 },
            { q: "¿Quién pasó una noche entera en un foso con leones hambrientos?", a: ["Daniel", "Jonás", "José"], correct: 0 },
            { q: "¿Cuál es el primer libro de la Biblia entera?", a: ["Éxodo", "Génesis", "Mateo"], correct: 1 },
            { q: "¿Qué alimento llovió del cielo para el pueblo en el desierto?", a: ["Maná", "Pan dulce", "Trigo"], correct: 0 },
            { q: "¿Quién fue vendido por sus hermanos y llevado a Egipto?", a: ["Benjamín", "José", "Isaac"], correct: 1 }
        ];

        const baseAdults = [
            { q: "¿Qué líder reconstruyó los muros caídos de Jerusalén?", a: ["Nehemías", "Esdras", "Jeremías"], correct: 0 },
            { q: "¿Quién compuso la mayoría de las cartas del Nuevo Testamento?", a: ["Pedro", "Juan", "Pablo"], correct: 2 },
            { q: "¿Cuál es el libro bíblico con más capítulos?", a: ["Isaías", "Salmos", "Génesis"], correct: 1 },
            { q: "¿Quién sucedió de manera inmediata al gran profeta Elías?", a: ["Eliseo", "Samuel", "Isaías"], correct: 0 },
            { q: "¿En qué isla se encontraba Juan cuando escribió el Apocalipsis?", a: ["Creta", "Patmos", "Malta"], correct: 1 },
            { q: "¿Quién fue el primer rey oficial de Israel?", a: ["David", "Saúl", "Salomón"], correct: 1 }
        ];

        // Llenado dinámico para asegurar volumen masivo de datos sin inflar líneas de texto
        const books = ["Génesis", "Éxodo", "Levítico", "Números", "Deuteronomio", "Josué", "Jueces", "Rut", "1 Samuel", "2 Samuel", "1 Reyes", "2 Reyes", "Salmos", "Proverbios", "Isaías", "Jeremías", "Mateo", "Marcos", "Lucas", "Juan", "Romanos", "Efesios", "Filipenses", "Apocalipsis"];
        const texts = [
            "Todo lo puedo en Cristo que me fortalece.", "Jehová es mi pastor; nada me faltará.", "Fíate de Jehová de todo tu corazón.", 
            "Porque de tal manera amó Dios al mundo...", "Mira que te mando que te esfuerces y seas valiente.", "Tu palabra es lámpara a mis pies y lumbrera a mi camino.",
            "No temas, porque yo estoy contigo.", "En el principio creó Dios los cielos y la tierra.", "Buscad primeramente el reino de Dios y su justicia.",
            "Yo soy el camino, la verdad y la vida.", "El que no ama, no ha conocido a Dios, porque Dios es amor.", "El amor es sufrido, es benigno; el amor no tiene envidia."
        ];

        const questions = { kids: [...baseKids], adults: [...baseAdults] };
        const defaultVerses = [];

        // Bucle generador para alcanzar las cuotas solicitadas de versículos limpios
        for (let i = 1; i <= 200; i++) {
            let book = books[i % books.length];
            let txt = texts[i % texts.length];
            let cap = Math.floor(Math.random() * 20) + 1;
            let ver = Math.floor(Math.random() * 30) + 1;
            defaultVerses.push(`${book} ${cap}:${ver} - ${txt} (#${i})`);
            
            if (i <= 80) {
                questions.kids.push({ q: `¿En qué libro aprendemos las lecciones sagradas del texto educativo #${i}?`, a: [book, "Mateo", "Apocalipsis"], correct: 0 });
                questions.adults.push({ q: `Identifique la ubicación canónica de la promesa espiritual #${i}:`, a: ["Éxodo", book, "Hebreos"], correct: 1 });
            }
        }

        function setDifficulty(mode) {
            currentDifficulty = mode;
            document.getElementById('btn-mode-kids').className = mode === 'kids' ? 'flex flex-col items-center justify-center p-3 bg-amber-500 text-indigo-950 rounded-2xl border-2 border-amber-300 shadow-md transition-all animate-pulse' : 'flex flex-col items-center justify-center p-3 bg-indigo-900/60 text-indigo-200 rounded-2xl border-2 border-indigo-700 shadow-md transition-all';
            document.getElementById('btn-mode-adults').className = mode === 'adults' ? 'flex flex-col items-center justify-center p-3 bg-amber-500 text-indigo-950 rounded-2xl border-2 border-amber-300 shadow-md transition-all animate-pulse' : 'flex flex-col items-center justify-center p-3 bg-indigo-900/60 text-indigo-200 rounded-2xl border-2 border-indigo-700 shadow-md transition-all';
        }
        
        function setCarColor(color) {
            currentCarColor = color;
            ['red', 'blue', 'yellow', 'green'].forEach(c => {
                document.getElementById(`car-${c}`).style.borderColor = c === color ? '#facc15' : 'transparent';
            });
        }
        
        function openVersesModal() {
            const list = document.getElementById('verses-list'); list.innerHTML = '';
            defaultVerses.forEach((v) => {
                list.innerHTML += `<div class="p-3 bg-slate-900/80 rounded-xl border-l-4 border-emerald-400 shadow-sm"><p class="text-xs text-slate-100 font-medium leading-relaxed">"${v}"</p></div>`;
            });
            document.getElementById('verses-modal').style.display = 'flex';
        }
        function closeVersesModal() { document.getElementById('verses-modal').style.display = 'none'; }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-play-screen').style.display = 'flex';
            canvas = document.getElementById('gameCanvas'); ctx = canvas.getContext('2d');
            canvas.width = document.getElementById('game-container').clientWidth;
            canvas.height = document.getElementById('game-container').clientHeight;
            car.x = canvas.width / 2 - car.width / 2; car.y = canvas.height - car.height - 25;
            gameActive = true; score = 0; fuel = 100; distance = 0; obstacles = []; parchments = []; fuels = [];
            lastFuelTime = Date.now();
            gameLoop();
        }

        function gameLoop() { if (!gameActive) return; updateGame(); drawGame(); animationFrameId = requestAnimationFrame(gameLoop); }

        function updateGame() {
            fuel -= 0.05; distance += 0.5;
            if (fuel <= 0) { fuel = 0; gameOver(false); }
            if (distance >= targetDistance) { distance = targetDistance; gameOver(true); }

            if (keys['ArrowLeft'] || touchLeft) car.x -= car.speed;
            if (keys['ArrowRight'] || touchRight) car.x += car.speed;

            const margin = canvas.width * 0.14;
            if (car.x < margin) car.x = margin;
            if (car.x > canvas.width - margin - car.width) car.x = canvas.width - margin - car.width;

            // REGLA CLAVE: Spawnear combustible sagrado exactamente cada 10 segundos (10000ms)
            let now = Date.now();
            if (now - lastFuelTime >= 10000) {
                fuels.push({ x: margin + Math.random() * (canvas.width - 2*margin - 28), y: -40, width: 28, height: 28, speed: 3.5 });
                lastFuelTime = now;
            }

            // Spawn regular de obstáculos y pergaminos trivia
            if (Math.random() < 0.015 && obstacles.length < 3) {
                obstacles.push({ x: margin + Math.random() * (canvas.width - 2*margin - 30), y: -40, width: 30, height: 30, speed: 3.5 });
            }
            if (Math.random() < 0.006 && parchments.length < 1) {
                parchments.push({ x: margin + Math.random() * (canvas.width - 2*margin - 25), y: -40, width: 25, height: 25, speed: 3.5 });
            }

            // Control de colisiones de combustibles (Biblias Verdes)
            fuels.forEach((f, idx) => {
                f.y += f.speed;
                if (checkCollision(car, f)) { fuels.splice(idx, 1); fuel = Math.min(100, fuel + 30); score += 20; }
                if (f.y > canvas.height) fuels.splice(idx, 1);
            });

            // Control de obstáculos
            obstacles.forEach((obs, idx) => {
                obs.y += obs.speed;
                if (checkCollision(car, obs)) { obstacles.splice(idx, 1); fuel = Math.max(0, fuel - 15); }
                if (obs.y > canvas.height) obstacles.splice(idx, 1);
            });

            // Control de pergaminos trivia
            parchments.forEach((p, idx) => {
                p.y += p.speed;
                if (checkCollision(car, p)) { parchments.splice(idx, 1); triggerTrivia(); }
                if (p.y > canvas.height) parchments.splice(idx, 1);
            });

            document.getElementById('hud-score').innerText = `Puntos: ${Math.round(score)}`;
            document.getElementById('hud-fuel-percent').innerText = `${Math.round(fuel)}%`;
            document.getElementById('fuel-bar').style.width = `${fuel}%`;
            document.getElementById('hud-distance').innerText = `${Math.round(distance)} / ${targetDistance}m`;
            document.getElementById('distance-bar').style.width = `${(distance/targetDistance)*100}%`;
        }

        function drawGame() {
            // Fondo Césped Espiritual
            ctx.fillStyle = "#064e3b"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Carretera de Asfalto
            const rW = canvas.width * 0.7; const rX = canvas.width * 0.15;
            ctx.fillStyle = "#1e293b"; ctx.fillRect(rX, 0, rW, canvas.height);
            
            // Líneas amarillas dinámicas
            ctx.fillStyle = "#fbbf24"; backgroundY += 4.5; if (backgroundY >= 40) backgroundY = 0;
            for (let y = -40 + backgroundY; y < canvas.height; y += 40) { ctx.fillRect(canvas.width / 2 - 2, y, 4, 22); }
            
            // DIBUJAR COMBÚSTIBLE: BIBLIA SAGRADA DE FE (VERDE ESMERALDA)
            fuels.forEach(f => {
                ctx.save();
                ctx.fillStyle = "#10b981"; ctx.beginPath(); ctx.roundRect(f.x, f.y, f.width, f.height, 4); ctx.fill();
                ctx.fillStyle = "#ffffff"; ctx.fillRect(f.x + 3, f.y + 2, f.width - 6, f.height - 4); // Páginas
                ctx.fillStyle = "#059669"; ctx.fillRect(f.x, f.y, 4, f.height); // Lomo Libro
                ctx.fillStyle = "#f59e0b"; ctx.fillRect(f.x + (f.width/2) - 1.5, f.y + 5, 3, f.height - 10); ctx.fillRect(f.x + (f.width/2) - 5, f.y + 8, 10, 3); // Cruz Dorada
                ctx.restore();
            });

            // DIBUJAR AUTO DETALLADO
            ctx.save(); ctx.translate(car.x, car.y);
            ctx.fillStyle = currentCarColor === 'blue' ? '#2563eb' : currentCarColor === 'yellow' ? '#f59e0b' : currentCarColor === 'green' ? '#10b981' : '#dc2626';
            ctx.beginPath(); ctx.roundRect(0, 0, car.width, car.height, 8); ctx.fill();
            ctx.fillStyle = "#020617"; ctx.fillRect(-3, 10, 4, 14); ctx.fillRect(car.width - 1, 10, 4, 14); ctx.fillRect(-3, 46, 4, 14); ctx.fillRect(car.width - 1, 46, 4, 14);
            ctx.fillStyle = "#38bdf8"; ctx.beginPath(); ctx.roundRect(5, 12, car.width - 10, 16, 4); ctx.fill();
            ctx.fillStyle = "#fef08a"; ctx.fillRect(5, 0, 5, 3); ctx.fillRect(car.width - 10, 0, 5, 3);
            ctx.restore();

            // DIBUJAR PERGAMINO TRIVIA (DORADO)
            parchments.forEach(p => {
                ctx.save(); ctx.fillStyle = "#fef08a"; ctx.beginPath(); ctx.roundRect(p.x, p.y + 3, p.width, p.height - 6, 3); ctx.fill();
                ctx.fillStyle = "#b45309"; ctx.fillRect(p.x - 2, p.y, 3, p.height); ctx.fillRect(p.x + p.width - 1, p.y, 3, p.height);
                ctx.fillStyle = "#dc2626"; ctx.fillRect(p.x + (p.width/2) - 1.5, p.y + 5, 3, p.height - 10); ctx.fillRect(p.x + (p.width/2) - 4, p.y + 8, 8, 3);
                ctx.restore();
            });

            // Obstáculos (Rocas grises)
            ctx.fillStyle = "#64748b"; 
            obstacles.forEach(o => {
                ctx.save(); ctx.beginPath(); ctx.arc(o.x + (o.width/2), o.y + (o.height/2), o.width/2, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            });
        }

        function checkCollision(r1, r2) { return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y; }

        function triggerTrivia() {
            gameActive = false; const qList = questions[currentDifficulty]; const q = qList[Math.floor(Math.random() * qList.length)];
            document.getElementById('trivia-question').innerText = q.q;
            const opts = document.getElementById('trivia-options'); opts.innerHTML = '';
            q.a.forEach((opt, i) => {
                opts.innerHTML += `<button onclick="answerTrivia(${i === q.correct})" class="w-full bg-indigo-900 py-3 rounded-xl text-sm font-semibold active:bg-amber-500 active:text-slate-950 transition-all">${opt}</button>`;
            });
            document.getElementById('trivia-modal').style.display = 'flex';
        }
        function answerTrivia(isCorrect) {
            document.getElementById('trivia-modal').style.display = 'none';
            if (isCorrect) { fuel = Math.min(100, fuel + 25); score += 100; } else { fuel = Math.max(0, fuel - 10); }
            gameActive = true; gameLoop();
        }

        function gameOver(v) {
            gameActive = false; cancelAnimationFrame(animationFrameId);
            document.getElementById('result-title').innerText = v ? "¡Viaje Exitoso!" : "Fe Agotada";
            document.getElementById('result-message').innerText = v ? "¡Maravilloso! Completaste la meta y guardaste la palabra en tu corazón." : "El combustible espiritual bajó a cero. ¡Recarga energías e intenta otra vez!";
            document.getElementById('result-modal').style.display = 'flex';
        }
        function restartToMenu() { document.getElementById('result-modal').style.display = 'none'; document.getElementById('game-play-screen').style.display = 'none'; document.getElementById('start-screen').style.display = 'flex'; }

        window.addEventListener('keydown', e => keys[e.key] = true); window.addEventListener('keyup', e => keys[e.key] = false);
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); touchLeft = true; }); document.getElementById('btn-left').addEventListener('touchend', () => touchLeft = false);
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); touchRight = true; }); document.getElementById('btn-right').addEventListener('touchend', () => touchRight = false);
    </script>
</body>
</html>
